<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daisy's Hamster Adventure 🐹</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff85a2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Daisy Hamster">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- 引入 Canvas Confetti 套件來實現全螢幕灑彩紙效果 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- 引入 Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登入視窗 -->
    <div id="login-modal">
        <div class="login-box">
            <h3>🌟 歡迎來到倉鼠樂園！</h3>
            <p style="color: #666; font-weight: bold; margin-bottom: 20px;">請輸入你的「專屬通關密碼」<br><span style="font-size: 0.9rem; font-weight: normal;">同一組密碼可以在不同設備讀取進度</span></p>
            <input type="text" id="secret-code-input" placeholder="密碼 (例如 DAISY)" autocomplete="off">
            <br>
            <button class="btn-login" onclick="login()">開始玩！</button>
        </div>
    </div>

    <h2>Daisy's Hamster Adventure 🐹</h2>
    
    <div class="app-container">
        <!-- 左側：拼字挑戰 10 關 -->
        <div class="card game-section">
            <div class="controls-row">
                <select id="cat" onchange="setupWeek()"></select>
                <select id="week" onchange="startLevel()"></select>
            </div>
            
            <div id="stage-info">Stage 1 / 10</div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px; width: 100%;">
                <button class="btn-speak" style="flex: 1; margin-bottom: 0;" onclick="speakWord(currentWord)">🔊 聽發音</button>
                <button class="btn-speak" style="flex: 1; margin-bottom: 0; background: #00bcd4; box-shadow: 0 4px 0 #0097a7;" id="btn-hint" onclick="useHint()">💡 提示 (2💰)</button>
            </div>
            <div id="target-slots"></div>
            <div id="game-message">聽發音並拼出單字吧！</div>
            <div id="word-translation" style="font-size: 1.5rem; color: #d63384; font-weight: bold; margin-bottom: 15px; text-align: center; display: none; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); min-height: 40px;"></div>
            <div id="keyboard"></div>
        </div>

        <!-- 右側：倉鼠養成 -->
        <div class="card hamster-section">
            <div class="hamster-stats">
                <div class="stat-row">
                    <div class="stat">⭐ Lvl: <span id="h-lvl">1</span></div>
                    <div class="stat">💰 金幣: <span id="h-coins">0</span></div>
                </div>
                <div class="exp-bar-container">
                    <div class="exp-bar-label"><span>EXP</span><span id="exp-text">0 / 100</span></div>
                    <div class="exp-bar"><div class="exp-bar-fill" id="exp-fill" style="width: 0%"></div></div>
                </div>
                <div class="exp-bar-container">
                    <div class="happiness-label"><span>快樂度</span><span class="mood-emoji" id="mood-emoji">😊</span></div>
                    <div class="happiness-bar"><div class="happiness-fill" id="happiness-fill" style="width: 50%"></div></div>
                </div>
            </div>
            <div class="hamster-cage" id="cage">
                <!-- 天空裝飾 -->
                <div class="habitat-sun"></div>
                <div class="cloud cloud1"></div>
                <div class="cloud cloud2"></div>
                <div class="cloud cloud3"></div>
                <!-- 小花裝飾 -->
                <span class="ground-flower" style="left:5%">🌼</span>
                <span class="ground-flower" style="left:25%; animation-delay:-0.5s">🌻</span>
                <span class="ground-flower" style="left:55%; animation-delay:-1s">🌸</span>
                <span class="ground-flower" style="left:80%; animation-delay:-1.5s">🌺</span>
                <!-- Combo 顯示 -->
                <div class="combo-display" id="combo-display"></div>
                <!-- 背景玩具：解鎖道具區 -->
                <div class="prop-house" id="prop-house"></div>
                <div class="prop-slide" id="prop-slide"></div>
                <div class="prop-wheel" id="prop-wheel"></div>
                <div class="prop-water" id="prop-water"></div>
                
                <!-- SVG Hamster -->
                <svg class="hamster-svg" id="hamster" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="50" cy="65" rx="35" ry="30" fill="#f4a460" /> <!-- Body -->
                    <circle cx="50" cy="45" r="25" fill="#deb887" /> <!-- Head -->
                    <circle cx="35" cy="25" r="10" fill="#f4a460" /> <!-- Ear L -->
                    <circle cx="65" cy="25" r="10" fill="#f4a460" /> <!-- Ear R -->
                    <circle cx="35" cy="25" r="5" fill="#ffc0cb" /> <!-- Ear L Inner -->
                    <circle cx="65" cy="25" r="5" fill="#ffc0cb" /> <!-- Ear R Inner -->
                    
                    <!-- 眼睛設定：區分張眼與閉眼 -->
                    <circle class="eye" cx="40" cy="40" r="3" fill="#000" /> <!-- Eye L -->
                    <circle class="eye" cx="60" cy="40" r="3" fill="#000" /> <!-- Eye R -->
                    <!-- 閉眼狀態 (預設隱藏) -->
                    <path class="eye-closed" d="M 35 40 Q 40 43 45 40" fill="none" stroke="#000" stroke-width="2" style="display:none;" />
                    <path class="eye-closed" d="M 55 40 Q 60 43 65 40" fill="none" stroke="#000" stroke-width="2" style="display:none;" />
                    
                    <ellipse cx="50" cy="50" rx="6" ry="4" fill="#ffc0cb" /> <!-- Nose -->
                    <path class="mouth" d="M 50 54 Q 45 60 40 55 M 50 54 Q 55 60 60 55" fill="none" stroke="#000" stroke-width="2" /> <!-- Mouth -->
                    <ellipse cx="30" cy="85" rx="8" ry="4" fill="#ffc0cb" /> <!-- Foot L -->
                    <ellipse cx="70" cy="85" rx="8" ry="4" fill="#ffc0cb" /> <!-- Foot R -->
                    <circle class="arm-l" cx="20" cy="60" r="5" fill="#f4a460" /> <!-- Arm L -->
                    <circle class="arm-r" cx="80" cy="60" r="5" fill="#f4a460" /> <!-- Arm R -->
                </svg>
            </div>
            
            <div class="pet-actions">
                <!-- 食物專區 -->
                <div class="action-btn" id="btn-feed-seed" onclick="feedHamster('seed', 1, 10, '🌻')">
                    <span>瓜子🌻</span>
                    <span style="font-size: 0.75rem; font-weight: normal;">1 💰/+10 Exp</span>
                </div>
                <div class="action-btn" id="btn-feed-carrot" onclick="feedHamster('carrot', 3, 40, '🥕')">
                    <span>胡蘿蔔🥕</span>
                    <span style="font-size: 0.75rem; font-weight: normal;">3 💰/+40 Exp</span>
                </div>
                <div class="action-btn" id="btn-feed-apple" onclick="feedHamster('apple', 5, 80, '🍎')">
                    <span>蘋果🍎</span>
                    <span style="font-size: 0.75rem; font-weight: normal;">5 💰/+80 Exp</span>
                </div>
                <!-- 互動專區 -->
                <div class="action-btn free" onclick="petHamster()">
                    <span>摸摸 🖐️</span>
                    <span style="font-size: 0.75rem; font-weight: normal;">免費呼嚕</span>
                </div>
                <div class="action-btn free" id="btn-sleep" onclick="sleepHamster()" style="grid-column: span 4;">
                    <span>睡覺 💤 (讓倉鼠好好休息)</span>
                </div>
                <!-- 商店專區 -->
                <!-- 水瓶按鈕 (商店) -->
                <div class="action-btn locked" id="btn-water" onclick="buyItem('water', 30, '水瓶💧')">
                    <span id="label-water">買水瓶 💧</span>
                    <span style="font-size: 0.8rem; font-weight: normal;" id="txt-water">30 💰</span>
                </div>
                <!-- 小木屋 (商店) -->
                <div class="action-btn locked" id="btn-house" onclick="buyItem('house', 100, '小木屋🏡')">
                    <span id="label-house">買木屋 🏡</span>
                    <span style="font-size: 0.8rem; font-weight: normal;" id="txt-house">100 💰</span>
                </div>
                <!-- 溜滑梯 (商店) -->
                <div class="action-btn locked" id="btn-slide" onclick="buyItem('slide', 150, '溜滑梯🎢')">
                    <span id="label-slide">溜滑梯 🎢</span>
                    <span style="font-size: 0.8rem; font-weight: normal;" id="txt-slide">150 💰</span>
                </div>
                <!-- 跑輪按鈕 (商店) -->
                <div class="action-btn locked" id="btn-run" onclick="playWheel()">
                    <span id="label-run">買跑輪 🎡</span>
                    <span style="font-size: 0.8rem; font-weight: normal;" id="txt-run">50 💰</span>
                </div>
            </div>
            <div style="margin-top:20px; font-size: 0.9rem; color:#888; font-weight:bold; text-align:center;">
                登入帳號: <span id="current-user" style="color: var(--primary);">---</span>
                <button onclick="logout()" style="margin-left: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid #ccc; background: white; cursor: pointer;">切換</button>
            </div>
        </div>
    </div>

    <script src="words.js"></script>
    <script>

        // --- Firebase 初始化 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCaWfJnDdK4R2mv2Ht3dQm2lyHhmpWIjo4",
            authDomain: "daisygame-30452.firebaseapp.com",
            databaseURL: "https://daisygame-30452-default-rtdb.firebaseio.com",
            projectId: "daisygame-30452",
            storageBucket: "daisygame-30452.firebasestorage.app",
            messagingSenderId: "548508102123",
            appId: "1:548508102123:web:40f02b8557ecca99523dae",
            measurementId: "G-B7N0LC0D6P"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let secretCode = "";

        // --- 倉鼠寵物系統資料 ---
        let petData = {
            level: 1,
            exp: 0,
            coins: 0, 
            totalWordsCleared: 0,
            happiness: 50,
            items: { wheel: false, water: false, house: false, slide: false }
        };

        let comboCount = 0; // 連續全對次數

        function migratePetData(data) {
            if(!data) return { level: 1, exp: 0, coins: 0, totalWordsCleared: 0, happiness: 50, items: { wheel: false, water: false, house: false, slide: false } };
            if(data.seeds !== undefined) {
                data.coins = data.seeds;
                delete data.seeds;
            }
            if(data.coins === undefined) data.coins = 0;
            if(data.happiness === undefined) data.happiness = 50;
            if(!data.items) data.items = { wheel: false, water: false, house: false, slide: false };
            if(data.items.house === undefined) data.items.house = false;
            if(data.items.slide === undefined) data.items.slide = false;
            return data;
        }

        function login() {
            const input = document.getElementById('secret-code-input').value.trim().toUpperCase();
            if(!input) { alert("請輸入通關密碼喔！"); return; }
            
            secretCode = input;
            localStorage.setItem("daisy_hamster_user", secretCode);
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('current-user').textContent = secretCode;
            
            // 立刻先刷新一次 UI (讓 BARRY 測試帳號馬上生效)
            updatePetUI();
            
            // 監聽 Firebase 資料同步
            const petRef = db.ref('users/' + secretCode + '/petData');
            petRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    petData = migratePetData(data);
                    
                    // 測試帳號 BARRY 預設擁有 999 金幣
                    if(secretCode === 'BARRY' && petData.coins < 999) {
                        petData.coins = 999;
                        petRef.set(petData);
                    }
                    
                    // 開始持續監聽
                    petRef.on('value', (snap) => {
                        if(snap.val()) { petData = migratePetData(snap.val()); updatePetUI(); }
                    });
                } else {
                    // 新玩家：檢查有沒有舊版的 LocalStorage 端資料可以繼承
                    const oldSaved = localStorage.getItem("daisy_hamster_save");
                    if(oldSaved) {
                        try { 
                            let parsed = JSON.parse(oldSaved); 
                            if(parsed && parsed.level) {
                                petData = migratePetData(parsed);
                                alert("🐰 發現你以前照顧過小倉鼠！已經幫你把舊進度升級上雲端囉！");
                            }
                        } catch(e) {}
                        localStorage.removeItem("daisy_hamster_save");
                    } else {
                        // 真的全新的玩家
                        petData = migratePetData(null);
                    }
                    
                    // 測試帳號 BARRY 預設擁有 999 金幣
                    if(secretCode === 'BARRY') {
                        petData.coins = 999;
                    }
                    
                    petRef.set(petData);
                    
                    // 開始持續監聽
                    petRef.on('value', (snap) => {
                        if(snap.val()) { petData = snap.val(); updatePetUI(); }
                    });
                }
                updatePetUI();
            });
            
            // 如果還沒開始遊戲 (第一次登入)，初始化遊戲關卡
            if (currentLevelQueue.length === 0) {
                setupConfig();
            }
        }

        function logout() {
            localStorage.removeItem("daisy_hamster_user");
            window.location.reload();
        }

        function loadPetData() {
            // 這個函數改成由 Firebase 的 on('value') 負責，不再使用
        }

        function savePetData() {
            if(secretCode) {
                db.ref('users/' + secretCode + '/petData').set(petData);
            }
        }

        function updatePetUI() {
            // 測試帳號 BARRY 每次更新 UI 時都確保有 999 金幣
            if(secretCode === 'BARRY' && petData.coins < 999) {
                petData.coins = 999;
                savePetData();
            }
            
            document.getElementById('h-lvl').textContent = petData.level;
            document.getElementById('h-coins').textContent = petData.coins;
            
            // EXP 進度條
            const expNeeded = petData.level * 100;
            const expPercent = Math.min(100, (petData.exp / expNeeded) * 100);
            document.getElementById('exp-fill').style.width = expPercent + '%';
            document.getElementById('exp-text').textContent = `${petData.exp} / ${expNeeded}`;
            
            // 快樂度
            const hap = Math.max(0, Math.min(100, petData.happiness || 50));
            document.getElementById('happiness-fill').style.width = hap + '%';
            const moodEmoji = hap >= 80 ? '😄' : (hap >= 50 ? '😊' : (hap >= 20 ? '😕' : '😢'));
            document.getElementById('mood-emoji').textContent = moodEmoji;
            
            // 倉鼠等級外觀變化
            const hamster = document.getElementById('hamster');
            hamster.classList.remove('lvl-3', 'lvl-5', 'lvl-8');
            if(petData.level >= 8) hamster.classList.add('lvl-8');
            else if(petData.level >= 5) hamster.classList.add('lvl-5');
            else if(petData.level >= 3) hamster.classList.add('lvl-3');
            
            // 等級外觀：高等級戴皇冠
            let crown = document.getElementById('hamster-crown');
            if(petData.level >= 10) {
                if(!crown) {
                    crown = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    crown.setAttribute('id', 'hamster-crown');
                    crown.setAttribute('x', '50'); crown.setAttribute('y', '18');
                    crown.setAttribute('text-anchor', 'middle'); crown.setAttribute('font-size', '20');
                    crown.textContent = '👑';
                    hamster.appendChild(crown);
                }
            } else if(crown) { crown.remove(); }
            
            // 處理食物按鈕狀態
            ['seed', 'carrot', 'apple'].forEach(food => {
                const btn = document.getElementById(`btn-feed-${food}`);
                const cost = food === 'seed' ? 1 : (food === 'carrot' ? 3 : 5);
                if(petData.coins < cost) btn.classList.add('disabled');
                else btn.classList.remove('disabled');
            });
            
            // 處理跑輪商店與解鎖
            const runBtn = document.getElementById('btn-run');
            const wheel = document.getElementById('prop-wheel');
            if(petData.items.wheel) {
                runBtn.classList.remove('locked');
                runBtn.classList.add('free');
                document.getElementById('label-run').textContent = "玩跑輪 🎡";
                runBtn.querySelector('#txt-run').textContent = "免費！";
                wheel.classList.add('show');
            } else {
                runBtn.classList.remove('free');
                document.getElementById('label-run').textContent = "買跑輪 🎡";
                runBtn.querySelector('#txt-run').textContent = "50 💰";
                if(petData.coins >= 50) runBtn.classList.remove('locked');
                else runBtn.classList.add('locked');
                wheel.classList.remove('show');
            }

            // 處理場景解鎖 - 統一刷新 UI
            refreshShopItem('water', 30, '水瓶💧', '喝水 💧');
            refreshShopItem('house', 100, '小木屋🏡', '進屋子 🏡');
            refreshShopItem('slide', 150, '溜滑梯🎢', '玩滑梯 🎢');
        }

        function refreshShopItem(itemId, cost, buyLabel, ownedLabel) {
            const btn = document.getElementById(`btn-${itemId}`);
            const prop = document.getElementById(`prop-${itemId}`);
            
            if(petData.items[itemId]) {
                btn.classList.remove('locked');
                btn.classList.add('free');
                document.getElementById(`label-${itemId}`).textContent = ownedLabel;
                btn.querySelector(`#txt-${itemId}`).textContent = "可互動";
                prop.classList.add('show');
            } else {
                btn.classList.remove('free');
                document.getElementById(`label-${itemId}`).textContent = `買${buyLabel}`;
                btn.querySelector(`#txt-${itemId}`).textContent = `${cost} 💰`;
                if(petData.coins >= cost) btn.classList.remove('locked');
                else btn.classList.add('locked');
                prop.classList.remove('show');
            }
        }

        // 通用的購買功能
        function buyItem(itemId, cost, itemName) {
            if (isSleeping) return wakeUp();
            if (isRunning) return;
            
            if(petData.items[itemId]) {
                // 已購買，觸發專屬互動
                if(itemId === 'water') {
                    const hamster = document.getElementById('hamster');
                    hamster.classList.add('happy');
                    playTone(800, 'sine', 0.1); setTimeout(()=>playTone(900, 'sine', 0.1), 150);
                    createFloatingEmoji('💧', 1200, -30);
                    addHappiness(5);
                    setTimeout(() => hamster.classList.remove('happy'), 1000);
                } else if(itemId === 'house') {
                    // 倉鼠跑進屋子裡
                    const hamster = document.getElementById('hamster');
                    if(hamster.classList.contains('hide-in-house')) return;
                    hamster.classList.add('hide-in-house');
                    playTone(400, 'sine', 0.2);
                    createFloatingEmoji('🏡', 1500, -40);
                    addHappiness(10);
                    setTimeout(() => {
                        hamster.classList.remove('hide-in-house');
                        hamster.classList.add('happy');
                        createFloatingEmoji('❤️', 1200, -30);
                        setTimeout(() => hamster.classList.remove('happy'), 800);
                    }, 2000);
                } else if(itemId === 'slide') {
                    // 倉鼠溜滑梯
                    const hamster = document.getElementById('hamster');
                    if(hamster.classList.contains('slide-down')) return;
                    hamster.classList.add('slide-down');
                    playTone(600, 'triangle', 0.1);
                    setTimeout(() => playTone(500, 'triangle', 0.1), 200);
                    setTimeout(() => playTone(400, 'triangle', 0.1), 400);
                    createFloatingEmoji('😆', 1500, -40);
                    addHappiness(15);
                    setTimeout(() => {
                        hamster.classList.remove('slide-down');
                        hamster.classList.add('happy');
                        setTimeout(() => hamster.classList.remove('happy'), 600);
                    }, 1500);
                }
                return;
            }
            
            // 購買邏輯
            if (petData.coins >= cost) {
                petData.coins -= cost;
                petData.items[itemId] = true;
                savePetData();
                updatePetUI();
                alert(`🎊 購買成功！小倉鼠擁有 ${itemName} 了！`);
                
                // 放個慶祝煙火
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 , x: 0.75} }); 
                playTone(600, 'sine', 0.1); setTimeout(()=>playTone(800, 'sine', 0.2), 150);
            } else {
                alert(`金幣還不夠買 ${itemName} 喔！(需要 ${cost} 💰)`);
            }
        }

        // --- 遊戲邏輯變數 ---
        let currentLevelQueue = []; // 目前這週的10個單字
        let currentStage = 0; // 0~9
        let currentWord = "";
        let targetLetters = [];
        let currentIndex = 0; // 單字拼到哪
        let mistakeCount = 0; // 這一題按錯幾次
        
        const catS = document.getElementById('cat');
        const wkS = document.getElementById('week');
        const msg = document.getElementById('game-message');

        // 音效
        let audioCtx;
        function playTone(freq, type, duration) {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.value = freq;
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function speakWord(w) {
            // 使用 Google Translate 的非官方 TTS 語音 API，發音品質比大部份瀏覽器內建的好且穩定
            const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(w)}&tl=en&client=tw-ob`;
            const audio = new Audio(url);
            audio.play().catch(e => {
                // 若被阻擋或出現問題，退回使用瀏覽器內建語音
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(w);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        function setupConfig() {
            catS.innerHTML = Object.keys(words).map(c => `<option>${c}</option>`).join('');
            setupWeek();
        }
        function setupWeek() {
            wkS.innerHTML = Object.keys(words[catS.value]).map(w => `<option>${w}</option>`).join('');
            // 不立刻開始，因為可能只是切換選單
            startLevel();
        }

        function createKeyboard() {
            const k = document.getElementById('keyboard');
            k.innerHTML = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').map(l => 
                `<button class="key" id="key-${l}" onclick="handleKey('${l}')">${l}</button>`
            ).join('');
        }

        // 開始選定週別的 10 關挑戰
        function startLevel() {
            let list = [...words[catS.value][wkS.value]];
            // 取最多 10 個單字並打亂
            list.sort(() => Math.random() - 0.5);
            currentLevelQueue = list.slice(0, 10);
            currentStage = 0;
            loadStage();
        }

        function loadStage() {
            if(currentStage >= currentLevelQueue.length) {
                // 通關整週
                msg.innerHTML = "🎉 <span style='color:green;'>關卡全破！獲得 5 💰 獎勵！</span> 🎉";
                petData.coins += 5;
                savePetData();
                updatePetUI();
                confetti({ particleCount: 200, spread: 160 });
                playTone(523.25, 'sine', 0.1); setTimeout(()=>playTone(659.25, 'sine', 0.1), 100); setTimeout(()=>playTone(783.99, 'sine', 0.2), 200);
                document.getElementById('keyboard').innerHTML = `<button onclick="startLevel()" style="grid-column: 1 / -1; padding: 20px; font-size: 1.5rem; background: var(--primary); color: white; border: none; border-radius: 10px; cursor:pointer;">再玩一次</button>`;
                return;
            }

            // 更新 UI
            document.getElementById('stage-info').textContent = `Stage ${currentStage + 1} / ${currentLevelQueue.length}`;
            document.getElementById('progress-fill').style.width = `${(currentStage / currentLevelQueue.length) * 100}%`;
            
            currentWord = currentLevelQueue[currentStage].toUpperCase();
            targetLetters = currentWord.split('');
            currentIndex = 0;
            mistakeCount = 0; // 每題重置錯誤次數
            msg.textContent = "聽發音並拼出單字吧！";
            msg.style.color = "var(--primary)";
            
            // 隱藏翻譯
            document.getElementById('word-translation').style.display = 'none';

            // 繪製格子
            const slotsContainer = document.getElementById('target-slots');
            slotsContainer.innerHTML = '';
            targetLetters.forEach((_, i) => {
                const slot = document.createElement('div');
                slot.className = 'slot' + (i === 0 ? ' current' : '');
                slotsContainer.appendChild(slot);
            });

            createKeyboard();
            setTimeout(() => speakWord(currentWord), 400);
        }

        function handleKey(letter) {
            const expect = targetLetters[currentIndex];
            if(letter === expect) {
                // 對了
                playTone(600, 'sine', 0.1);
                const slots = document.getElementsByClassName('slot');
                slots[currentIndex].classList.remove('current');
                slots[currentIndex].classList.add('filled');
                slots[currentIndex].textContent = letter;
                
                // 鍵盤復原顏色但不 disabled，因為可能有重複字母
                
                currentIndex++;
                if(currentIndex < targetLetters.length) {
                    slots[currentIndex].classList.add('current');
                } else {
                    // 完成單字
                    wordCleared();
                }
            } else {
                // 錯了，抖動鍵盤按鈕，不扣分
                mistakeCount++;
                playTone(200, 'sawtooth', 0.15);
                const btn = document.getElementById(`key-${letter}`);
                if(btn) {
                    btn.style.backgroundColor = '#ff4757';
                    btn.style.color = 'white';
                    btn.style.transform = 'translateY(2px) translateX(-2px)';
                    setTimeout(() => {
                        btn.style.backgroundColor = '';
                        btn.style.color = '';
                        btn.style.transform = '';
                    }, 300);
                }
            }
        }

        function useHint() {
            if(currentStage >= currentLevelQueue.length) return;
            if(currentIndex >= targetLetters.length) return;
            
            if(petData.coins < 2) {
                alert("金幣不夠使用提示喔！你需要 2 💰");
                return;
            }
            petData.coins -= 2;
            savePetData();
            updatePetUI();
            
            const expectedLetter = targetLetters[currentIndex];
            const btn = document.getElementById(`key-${expectedLetter}`);
            if (btn) {
                playTone(500, 'triangle', 0.1);
                // Highlight blink animation
                btn.style.transition = 'all 0.2s';
                btn.style.backgroundColor = '#ffeb3b';
                btn.style.color = '#333';
                btn.style.boxShadow = '0 0 15px #fbc531';
                btn.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    btn.style.backgroundColor = '';
                    btn.style.color = '';
                    btn.style.boxShadow = '0 3px 0 #ccc';
                    btn.style.transform = '';
                }, 1000);
            }
        }

        function wordCleared() {
            const reward = Math.max(1, 3 - mistakeCount);
            const stars = mistakeCount === 0 ? '⭐⭐⭐' : (mistakeCount === 1 ? '⭐⭐' : '⭐');
            
            // Combo 系統
            if(mistakeCount === 0) {
                comboCount++;
            } else {
                comboCount = 0;
            }
            
            let bonusCoins = 0;
            let comboText = '';
            if(comboCount >= 3) {
                bonusCoins = 5;
                comboText = `🔥 ${comboCount} COMBO! +${bonusCoins} Bonus!`;
            }
            
            const totalReward = reward + bonusCoins;
            let displayText = `答對了！${stars} <span style='color:#f39c12'>+${reward} 💰</span>`;
            if(bonusCoins > 0) displayText += ` <span style='color:#e74c3c; font-size:0.9rem'>+${bonusCoins} Combo!</span>`;
            msg.innerHTML = displayText;
            
            // 顯示 Combo
            if(comboText) {
                const comboEl = document.getElementById('combo-display');
                comboEl.textContent = comboText;
                comboEl.classList.add('show');
                setTimeout(() => comboEl.classList.remove('show'), 2000);
            }
            
            document.getElementById('keyboard').innerHTML = '';
            
            petData.coins += totalReward;
            petData.totalWordsCleared += 1;
            
            // 慶祝特效
            for(let i = 0; i < Math.min(totalReward, 5); i++) {
                setTimeout(() => triggerSeedDrop(), i * 200);
            }
            
            // 快樂度提升
            addHappiness(mistakeCount === 0 ? 8 : 3);
            
            // 小倉鼠跳躍開心
            const hamster = document.getElementById('hamster');
            hamster.classList.remove('happy');
            void hamster.offsetWidth;
            hamster.classList.add('happy');

            savePetData();
            updatePetUI();
            
            speakWord(currentWord);

            // 顯示中文翻譯
            const transDiv = document.getElementById('word-translation');
            const translation = wordTranslations[currentWord.toLowerCase()] || "";
            if (translation) {
                transDiv.style.display = 'block';
                transDiv.textContent = translation;
                transDiv.style.animation = 'jump 0.5s ease-out';
            }

            // 3秒後進入下一題
            setTimeout(() => {
                currentStage++;
                loadStage();
            }, 3000);
        }

        // --- 倉鼠互動特效 ---
        function triggerSeedDrop(emoji = '💰') {
            const cage = document.getElementById('cage');
            const seed = document.createElement('div');
            seed.className = 'falling-seed';
            seed.textContent = emoji;
            seed.style.left = `${40 + Math.random() * 20}%`;
            cage.appendChild(seed);
            setTimeout(() => seed.remove(), 1000);
        }

        // --- 新增的互動系統 ---
        let isSleeping = false;
        let isRunning = false;

        function wakeUp() {
            if(!isSleeping) return;
            isSleeping = false;
            const hamster = document.getElementById('hamster');
            hamster.classList.remove('sleep');
            document.getElementById('btn-sleep').querySelector('span').textContent = "睡覺 💤";
            playTone(800, 'sine', 0.1);
        }

        function petHamster() {
            if(isRunning) return;
            wakeUp();
            playTone(900, 'sine', 0.1); setTimeout(()=>playTone(1000, 'sine', 0.15), 100);
            const hamster = document.getElementById('hamster');
            
            const mouth = hamster.querySelector('.mouth');
            const originalMouth = mouth.getAttribute('d');
            mouth.setAttribute('d', "M 45 57 Q 50 63 55 57 Q 50 52 45 57");
            
            hamster.classList.add('happy');
            createFloatingEmoji('💖', 1500, -30);
            addHappiness(5);
            
            setTimeout(() => {
                hamster.classList.remove('happy');
                mouth.setAttribute('d', originalMouth);
            }, 1000);
        }

        // 快樂度系統
        function addHappiness(amount) {
            petData.happiness = Math.min(100, (petData.happiness || 50) + amount);
            savePetData();
            updatePetUI();
        }

        // 快樂度隨時間緩慢下降
        setInterval(() => {
            if(petData.happiness > 0 && secretCode) {
                petData.happiness = Math.max(0, petData.happiness - 1);
                savePetData();
                updatePetUI();
            }
        }, 60000); // 每分鐘減 1

        function playWheel() {
            if (isSleeping) return wakeUp(); // 先叫醒
            if (isRunning) return;
            
            // 處理購買邏輯
            if (!petData.items.wheel) {
                if (petData.coins >= 50) {
                    petData.coins -= 50;
                    petData.items.wheel = true;
                    savePetData();
                    updatePetUI();
                    alert("🎡 購買成功！小倉鼠得到新玩具了！");
                    // 買完可以繼續玩下去
                } else {
                    alert("金幣還不夠買跑輪喔！(需要 50 💰)");
                    return;
                }
            }

            isRunning = true;
            const hamster = document.getElementById('hamster');
            const wheel = document.getElementById('prop-wheel');
            
            hamster.classList.add('run');
            wheel.classList.add('spin');
            playTone(300, 'triangle', 0.1);
            addHappiness(10);
            
            setTimeout(() => {
                hamster.classList.remove('run');
                wheel.classList.remove('spin');
                isRunning = false;
                petHamster();
            }, 3000);
        }

        // (使用新的通用 buyItem)

        function sleepHamster() {
            if(isRunning) return;
            const hamster = document.getElementById('hamster');
            const sleepBtnSpan = document.getElementById('btn-sleep').querySelector('span');

            if(isSleeping) {
                wakeUp();
            } else {
                isSleeping = true;
                hamster.classList.add('sleep');
                sleepBtnSpan.textContent = "叫醒 ☀️";
                playTone(200, 'sine', 0.5); // ZZZ 聲音
                
                // 定期冒出 Zzz
                let zzzInterval = setInterval(() => {
                    if(!isSleeping) return clearInterval(zzzInterval);
                    createFloatingEmoji('Zzz', 2000, -50);
                }, 1500);
            }
        }

        // 共用的飄浮表情小工具
        function createFloatingEmoji(emojiText, duration, yOffset) {
            const cage = document.getElementById('cage');
            const emoji = document.createElement('div');
            emoji.textContent = emojiText;
            emoji.style.position = 'absolute';
            emoji.style.left = '50%'; emoji.style.bottom = '60px'; // 倉鼠中心點
            emoji.style.fontSize = '2rem'; emoji.style.fontWeight = 'bold'; emoji.style.color = '#ff6b81';
            emoji.style.transition = `all ${duration}ms ease-out`;
            emoji.style.opacity = '1'; emoji.style.transform = 'translate(-50%, 0)';
            emoji.style.textShadow = "1px 1px 2px white";
            emoji.style.pointerEvents = "none";
            emoji.style.zIndex = "10";
            cage.appendChild(emoji);
            
            // 觸發動畫
            setTimeout(() => {
                emoji.style.bottom = `calc(60px - ${yOffset}px)`;
                emoji.style.opacity = '0';
            }, 50);
            setTimeout(() => emoji.remove(), duration);
        }

        function feedHamster(foodType = 'seed', cost = 1, exp = 10, emoji = '🌻') {
            if(petData.coins < cost || isRunning) {
                if(petData.coins < cost && !isRunning) alert(`金幣不夠買${emoji}了！(需要 ${cost} 💰)`);
                return;
            }
            wakeUp();
            
            petData.coins -= cost;
            petData.exp += exp;
            
            // 顯示食物掉落
            triggerSeedDrop(emoji);
            addHappiness(exp >= 80 ? 15 : (exp >= 40 ? 10 : 5));
            
            // 升級邏輯 (這裡簡化，每 100 exp 升一級)
            if(petData.exp >= petData.level * 100) {
                petData.level += 1;
                petData.exp = 0;
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 , x: 0.75} }); // 在右側放煙火
                playTone(800, 'sine', 0.3); // Level up sound
                alert(`太棒了！小倉鼠升級到 Level ${petData.level} 啦！`);
            }
            
            savePetData();
            updatePetUI();
            
            // 動畫與音效
            playTone(400, 'square', 0.1); setTimeout(()=>playTone(450, 'square', 0.1), 150);
            
            const hamster = document.getElementById('hamster');
            hamster.classList.remove('eat');
            void hamster.offsetWidth;
            hamster.classList.add('eat');
            
            // 飄出愛心
            createFloatingEmoji('❤️', 1000, -60);
        }

        // (舊的備份/還原邏輯已透過 Firebase 取代)

        // 初始化
        window.onload = () => {
            // 檢查有沒有存過密碼
            const savedUser = localStorage.getItem("daisy_hamster_user");
            if(savedUser) {
                document.getElementById('secret-code-input').value = savedUser;
                login(); // 自動登入
            }
            
            // 如果沒登入，先不要初始化遊戲選單 (等到點擊登入再觸發)
            
            // 實體鍵盤支援
            window.onkeydown = function(e) {
                if(document.activeElement.tagName === 'INPUT') {
                    if(e.key === 'Enter') login();
                    return;
                }
                if(document.getElementById('login-modal').style.display !== 'none') return; // 在登入畫面時禁用遊戲鍵盤
                
                const key = e.key.toUpperCase();
                if(/^[A-Z]$/.test(key) && currentStage < currentLevelQueue.length) {
                    handleKey(key);
                }
            }
        };

        // PWA Service Worker 註冊
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((registration) => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, (err) => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
