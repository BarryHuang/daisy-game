<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>SNAKE // NEON GRID</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#04060f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SNAKE" />
  <link rel="apple-touch-icon" href="snake_icon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --c-cyan:   #00f2fe;
      --c-blue:   #4facfe;
      --c-purple: #a855f7;
      --c-pink:   #f472b6;
      --c-mag:    #e879f9;
      --c-cream:  #fdf4e3;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-bd: rgba(255,255,255,0.10);
    }

    html {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    html, body { width:100%; height:100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #04060f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding:
        env(safe-area-inset-top,8px)
        env(safe-area-inset-right,8px)
        env(safe-area-inset-bottom,8px)
        env(safe-area-inset-left,8px);
      overflow: hidden;
      position: relative;
    }

    /* ── Background ── */
    .bg {
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79,172,254,.12) 0%,transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(168,85,247,.10) 0%,transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #06091a 0%, #04060f 100%);
      animation: bgPulse 12s ease-in-out infinite;
    }
    @keyframes bgPulse { 0%,100%{opacity:1} 50%{opacity:.85} }

    .orb {
      position:fixed; border-radius:50%;
      filter:blur(70px); opacity:.18; z-index:0;
      animation:orbDrift 18s ease-in-out infinite;
    }
    .orb1{width:480px;height:480px;top:-140px;left:-120px;background:radial-gradient(circle,#4facfe,transparent);}
    .orb2{width:360px;height:360px;bottom:-100px;right:-80px;background:radial-gradient(circle,#a855f7,transparent);animation-delay:-7s;}
    .orb3{width:260px;height:260px;top:45%;left:52%;transform:translate(-50%,-50%);background:radial-gradient(circle,#00f2fe,transparent);animation-delay:-13s;opacity:.10;}
    @keyframes orbDrift{0%,100%{transform:translate(0,0)scale(1)}40%{transform:translate(24px,-16px)scale(1.06)}70%{transform:translate(-16px,22px)scale(.94)}}

    /* ── Wrapper ── */
    .wrapper {
      position:relative; z-index:10;
      display:flex; flex-direction:column;
      align-items:center; gap:12px;
      width:100%;
    }

    /* ── Title ── */
    .title {
      font-family:'Orbitron',sans-serif;
      font-weight:900; font-size:clamp(1.0rem,4vw,1.9rem);
      letter-spacing:.3em; color:#fff;
      text-shadow:0 0 8px var(--c-cyan),0 0 20px var(--c-cyan),0 0 45px var(--c-blue),0 0 90px rgba(79,172,254,.4);
      animation:titleBreath 4s ease-in-out infinite;
      user-select:none;
    }
    @keyframes titleBreath{0%,100%{opacity:1}50%{opacity:.8}}

    /* ── HUD ── */
    .hud {
      display:flex; gap:clamp(14px,5vw,36px);
      padding:8px clamp(14px,5vw,36px);
      background:var(--glass-bg);
      border:1px solid var(--glass-bd); border-radius:999px;
      backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
      box-shadow:0 8px 32px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.08);
    }
    .hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
    .hud-label{font-size:clamp(.5rem,.9vw,.58rem);font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.35);}
    .hud-value{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(.95rem,3.5vw,1.5rem);font-weight:700;color:#fff;
      text-shadow:0 0 12px var(--c-cyan),0 0 24px var(--c-blue);
      min-width:3ch;text-align:center;
      transition:transform .15s ease,text-shadow .15s ease;
    }
    .hud-value.bump{transform:scale(1.35);text-shadow:0 0 18px var(--c-cyan),0 0 36px var(--c-cyan),0 0 72px var(--c-blue);}
    .speed-track{width:clamp(52px,12vw,90px);height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:6px;}
    .speed-fill{height:100%;width:6%;background:linear-gradient(90deg,var(--c-blue),var(--c-cyan));border-radius:2px;box-shadow:0 0 6px var(--c-cyan);transition:width .6s cubic-bezier(.4,0,.2,1);}

    /* ── Canvas shell ── */
    .canvas-shell{
      position:relative;padding:12px;
      background:var(--glass-bg);border:1px solid var(--glass-bd);border-radius:18px;
      backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
      box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 80px rgba(79,172,254,.06),inset 0 1px 0 rgba(255,255,255,.09);
    }
    #c{display:block;border-radius:8px;}

    /* ── Overlays ── */
    .overlay{
      position:absolute;inset:12px;border-radius:8px;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:14px;
      background:rgba(4,6,15,.80);
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      z-index:20;transition:opacity .45s ease;
    }
    .overlay.off{opacity:0;pointer-events:none;}

    .ov-title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(1.3rem,5vw,2.4rem);letter-spacing:.1em;color:#fff;}
    .ov-title.cyan{text-shadow:0 0 10px var(--c-cyan),0 0 28px var(--c-cyan),0 0 60px var(--c-blue);}
    .ov-title.pink{text-shadow:0 0 10px var(--c-pink),0 0 28px var(--c-pink),0 0 60px var(--c-purple);}
    /* Pause overlay gets a softer rose title */
    .ov-title.rose{text-shadow:0 0 10px #fda4af,0 0 24px #fda4af,0 0 50px #f472b6;}

    .ov-sub{font-size:clamp(.68rem,2vw,.82rem);letter-spacing:.1em;color:rgba(255,255,255,.42);}
    .ov-final{font-family:'Orbitron',sans-serif;font-size:clamp(.9rem,3vw,1.3rem);color:var(--c-cyan);text-shadow:0 0 14px var(--c-cyan);}
    .ov-record{font-size:.76rem;letter-spacing:.18em;color:var(--c-cyan);font-weight:600;}

    /* ── Neon button ── */
    .btn{
      position:relative;
      padding:clamp(9px,2vh,13px) clamp(24px,6vw,44px);
      font-family:'Orbitron',sans-serif;
      font-size:clamp(.58rem,1.5vw,.72rem);font-weight:700;
      letter-spacing:.22em;text-transform:uppercase;
      color:#fff;background:transparent;
      border:1.5px solid var(--c-cyan);border-radius:999px;
      cursor:pointer;overflow:hidden;
      box-shadow:0 0 12px rgba(0,242,254,.18),inset 0 0 12px rgba(0,242,254,.04);
      transition:box-shadow .3s ease,transform .2s ease;
    }
    .btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--c-cyan),var(--c-blue));opacity:0;transition:opacity .3s ease;}
    .btn:hover::before{opacity:.14;}
    .btn:hover{box-shadow:0 0 22px rgba(0,242,254,.55),0 0 48px rgba(79,172,254,.30),inset 0 0 20px rgba(0,242,254,.10);transform:translateY(-2px);}
    .btn:active{transform:translateY(0);}
    .btn span{position:relative;z-index:1;}

    /* ── Pause button (rose/pink palette, softer for kids) ── */
    .pause-btn{
      display:none;
      padding:7px 20px;
      font-size:clamp(.72rem,2.5vw,.85rem);
      letter-spacing:.08em;
      color:#fda4af;
      background:rgba(253,164,175,.07);
      border:1px solid rgba(253,164,175,.28);
      border-radius:999px;
      cursor:pointer;
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      transition:all .2s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .pause-btn.show{display:block;}
    .pause-btn:hover,.pause-btn:active{
      background:rgba(253,164,175,.2);
      border-color:rgba(253,164,175,.7);
      box-shadow:0 0 16px rgba(253,164,175,.3);
    }

    /* ── Encouragement popup (fixed, floats above everything) ── */
    /*
     * Positioned fixed so it appears centred regardless of scroll/layout.
     * The animation: pops in with overshoot scale, holds, then floats up & fades.
     * A multicolour text-shadow rainbow cycles via hue-rotate on the element.
     */
    .encourage{
      position:fixed;
      top:16%;left:50%;
      transform:translateX(-50%);
      white-space:nowrap;
      font-family:'Orbitron',sans-serif;
      font-size:clamp(1.1rem,4.5vw,1.8rem);
      font-weight:900;
      color:#fff;
      text-shadow:0 0 10px var(--c-pink),0 0 24px var(--c-pink),0 0 50px var(--c-mag);
      z-index:300;
      pointer-events:none;
    }
    .encourage.off{display:none;}
    .encourage.show{
      display:block;
      animation:encAnim 3.2s ease forwards;
    }
    @keyframes encAnim{
      0%  {opacity:0;transform:translateX(-50%) scale(.55) translateY(16px);filter:hue-rotate(0deg);}
      16% {opacity:1;transform:translateX(-50%) scale(1.22) translateY(-6px);filter:hue-rotate(30deg);}
      28% {transform:translateX(-50%) scale(1)   translateY(0);              filter:hue-rotate(0deg);}
      72% {opacity:1;}
      100%{opacity:0;transform:translateX(-50%) scale(.88) translateY(-22px);}
    }

    /* ── D-Pad ── */
    .dpad{
      display:none;
      grid-template-areas:".   up  ." "left .  right" ".  down .";
      grid-template-columns:repeat(3,1fr);
      grid-template-rows:repeat(3,1fr);
      gap:6px;
      width:200px;height:200px;
    }
    @media(pointer:coarse),(max-width:600px){.dpad{display:grid;}}
    @media(pointer:coarse)and(orientation:landscape)and(max-height:500px){.dpad{display:none;}}

    .dpad-btn{
      display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.04);
      border:1.5px solid rgba(0,242,254,.25);border-radius:12px;
      color:rgba(0,242,254,.75);font-size:1.3rem;
      cursor:pointer;user-select:none;touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      transition:background .08s,border-color .08s,box-shadow .08s;
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    }
    .dpad-btn:active,.dpad-btn.pressed{
      background:rgba(0,242,254,.14);border-color:rgba(0,242,254,.85);
      box-shadow:0 0 18px rgba(0,242,254,.45),inset 0 0 10px rgba(0,242,254,.1);
      color:#fff;
    }
    .dp-up{grid-area:up;}.dp-left{grid-area:left;}.dp-right{grid-area:right;}.dp-down{grid-area:down;}
  </style>
</head>
<body>

<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- Encouragement popup (outside wrapper so it's truly centred) -->
<div class="encourage off" id="elEncourage"></div>

<div class="wrapper">

  <h1 class="title">SNAKE //</h1>

  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="elScore">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Best</span>
      <span class="hud-value" id="elBest">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Speed</span>
      <div class="speed-track"><div class="speed-fill" id="elSpeedBar"></div></div>
    </div>
  </div>

  <div class="canvas-shell">
    <canvas id="c"></canvas>

    <!-- Start -->
    <div class="overlay" id="ovStart">
      <div class="ov-title cyan">NEON SNAKE</div>
      <div class="ov-sub" id="ovHint">Arrow keys / WASD to move</div>
      <button class="btn" id="btnStart"><span>START GAME</span></button>
    </div>

    <!-- Game over -->
    <div class="overlay off" id="ovEnd">
      <div class="ov-title pink">GAME OVER</div>
      <div class="ov-final" id="elFinal">Score: 0</div>
      <div class="ov-record" id="elRecord" style="display:none">✦ NEW RECORD ✦</div>
      <button class="btn" id="btnRestart"><span>PLAY AGAIN</span></button>
    </div>

    <!-- Pause -->
    <div class="overlay off" id="ovPause">
      <div class="ov-title rose" style="font-size:clamp(1.3rem,4.5vw,2rem)">小公主休息中...</div>
      <div class="ov-sub">點擊任何地方繼續 🌸</div>
      <button class="btn" id="btnResume"><span>▶ 繼續遊戲</span></button>
    </div>
  </div>

  <!-- Pause toggle button (visible only during gameplay) -->
  <button class="pause-btn" id="btnPause">🌸 休息一下</button>

  <!-- D-Pad -->
  <div class="dpad" id="dpad">
    <button class="dpad-btn dp-up"    id="dpUp">▲</button>
    <button class="dpad-btn dp-left"  id="dpLeft">◀</button>
    <button class="dpad-btn dp-right" id="dpRight">▶</button>
    <button class="dpad-btn dp-down"  id="dpDown">▼</button>
  </div>

</div>

<script>
/* =========================================================================
   SNAKE — NEON EDITION  v2  (PWA · Mobile · Kid-Friendly)
   New features:
     • Web Audio API  — synthesised eat / death sounds
     • Antennae       — two wobbling feelers on snake head
     • Floating hearts — gentle pink hearts drifting up the canvas
     • Pause          — 🌸 休息一下 button + overlay
     • Encouragement  — milestone text popups at 10/20/30/50 pts
     • Softer speed   — SPD_BASE raised 15% (130 → 150 ms)
   ========================================================================= */
(() => {
'use strict';

// ── Constants ──────────────────────────────────────────────────────────────
const COLS = 25, ROWS = 25;
// Initial tick interval is 15% slower than before to be kid-friendly
const SPD_BASE = 150, SPD_MIN = 50;
const SCORE_FOR_MAX = 100;

let CS = 22;   // cell size in px — recomputed on resize

// ── Colours ────────────────────────────────────────────────────────────────
const C_HEAD  = '#00f2fe';
const C_TAIL  = '#4facfe';
const C_GLOW  = '#00d4ff';
const C_FOOD  = '#f472b6';
const C_FOOD2 = '#e879f9';

// ── DOM ────────────────────────────────────────────────────────────────────
const canvas    = document.getElementById('c');
const ctx       = canvas.getContext('2d');
const elScore   = document.getElementById('elScore');
const elBest    = document.getElementById('elBest');
const elFinal   = document.getElementById('elFinal');
const elRecord  = document.getElementById('elRecord');
const elSpeed   = document.getElementById('elSpeedBar');
const ovStart   = document.getElementById('ovStart');
const ovEnd     = document.getElementById('ovEnd');
const ovPause   = document.getElementById('ovPause');
const ovHint    = document.getElementById('ovHint');
const btnStart  = document.getElementById('btnStart');
const btnRestart= document.getElementById('btnRestart');
const btnResume = document.getElementById('btnResume');
const btnPause  = document.getElementById('btnPause');
const elEnc     = document.getElementById('elEncourage');

// ── Game state ─────────────────────────────────────────────────────────────
let snake, dir, nextDir, food;
let score = 0, best = 0;
let running = false, paused = false;
let lastTick = 0, interval = SPD_BASE;

// ── Render state ───────────────────────────────────────────────────────────
let foodPhase    = 0;    // food breathing (every rAF)
let flowOffset   = 0;    // snake colour flow (every tick)
let antennaPhase = 0;    // antenna wobble (every rAF)
let particles    = [];
let glitch       = null;
let hearts       = [];   // floating heart decorations

// ── Encouragement state ────────────────────────────────────────────────────
const ENC_MSGS = { 10:'妳好棒！🌟', 20:'太厲害了！✨', 30:'超級小天才！🎉', 50:'無敵小公主！👑' };
let shownMilestones = new Set();
let encTimer = null;

// =========================================================================
// ① WEB AUDIO API — SYNTHESISED SOUND EFFECTS
//
// AudioContext is created lazily on first user gesture to comply with
// browser autoplay policy.  All sounds are built from raw oscillators +
// GainNodes — no audio files needed.
// =========================================================================

let audioCtx = null;

/** Create (or resume) the AudioContext.  Must be called inside a user-event handler. */
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

/**
 * playEat — "ding!" ascending two-tone chime.
 * Sine oscillator ramps 880 Hz → 1320 Hz in 80 ms,
 * then decays to silence by 220 ms.  Soft gain (0.28) avoids harshness.
 */
function playEat() {
  if (!audioCtx) return;
  try {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    const t = audioCtx.currentTime;
    osc.frequency.setValueAtTime(880, t);
    osc.frequency.exponentialRampToValueAtTime(1320, t + 0.08);
    gain.gain.setValueAtTime(0.28, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    osc.start(t); osc.stop(t + 0.22);
  } catch(_) {}
}

/**
 * playDeath — soft "whomp" descending slide.
 * Sine oscillator glides 380 Hz → 75 Hz over 0.9 s,
 * gain fades out gently — not jarring for children.
 */
function playDeath() {
  if (!audioCtx) return;
  try {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    const t = audioCtx.currentTime;
    osc.frequency.setValueAtTime(380, t);
    osc.frequency.exponentialRampToValueAtTime(75, t + 0.85);
    gain.gain.setValueAtTime(0.22, t);
    gain.gain.linearRampToValueAtTime(0.14, t + 0.35);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.95);
    osc.start(t); osc.stop(t + 0.95);
  } catch(_) {}
}

// =========================================================================
// RESPONSIVE CANVAS SIZING
// =========================================================================

function computeCS() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const isLandscape = vw > vh;
  const isTouch = window.matchMedia('(pointer:coarse)').matches || vw < 600;
  const hasDpad = isTouch && !isLandscape;
  // Reserved vertical space: title + HUD + pause btn + gaps + D-pad
  const reserved = 40 + 52 + 36 + 38 + (hasDpad ? 212 : 0);
  const avail = Math.min(vw - 52, vh - reserved);
  CS = Math.max(11, Math.min(22, Math.floor(avail / COLS)));
}

function applyResize() {
  computeCS();
  canvas.width  = CS * COLS;
  canvas.height = CS * ROWS;
  initHearts();   // reinitialise hearts to new canvas size
}

let resizeTid;
window.addEventListener('resize', () => { clearTimeout(resizeTid); resizeTid = setTimeout(applyResize, 120); });
window.addEventListener('orientationchange', () => setTimeout(applyResize, 300));

// =========================================================================
// COLOUR HELPERS
// =========================================================================

function hex2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lerp(h1,h2,t){
  const[r1,g1,b1]=hex2rgb(h1),[r2,g2,b2]=hex2rgb(h2);
  return`rgb(${~~(r1+(r2-r1)*t)},${~~(g1+(g2-g1)*t)},${~~(b1+(b2-b1)*t)})`;
}

// =========================================================================
// CANVAS HELPERS
// =========================================================================

function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

// =========================================================================
// GAME INIT
// =========================================================================

function init() {
  const cx=COLS>>1, cy=ROWS>>1;
  snake   = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy},{x:cx-3,y:cy}];
  dir     = {x:1,y:0};
  nextDir = {x:1,y:0};
  score   = 0; interval = SPD_BASE;
  flowOffset = 0; particles = []; glitch = null;
  shownMilestones.clear();
  spawnFood();
  refreshHUD();
}

// =========================================================================
// FOOD
// =========================================================================

function spawnFood() {
  const occ = new Set(snake.map(s=>`${s.x},${s.y}`));
  let x,y;
  do{x=(Math.random()*COLS)|0;y=(Math.random()*ROWS)|0;}while(occ.has(`${x},${y}`));
  food={x,y};
}

// =========================================================================
// SCORING & HUD
// =========================================================================

function refreshHUD() {
  elScore.textContent = score;
  elBest.textContent  = best;
  const pct = Math.min(100,((SPD_BASE-interval)/(SPD_BASE-SPD_MIN))*100);
  elSpeed.style.width = Math.max(5,pct)+'%';
}

function addScore(pts) {
  score += pts;
  if (score > best) best = score;
  interval = Math.max(SPD_MIN, SPD_BASE - (score/SCORE_FOR_MAX)*(SPD_BASE-SPD_MIN));
  elScore.classList.remove('bump');
  void elScore.offsetWidth;
  elScore.classList.add('bump');
  setTimeout(()=>elScore.classList.remove('bump'),220);
  refreshHUD();
  checkMilestone(score);
}

// =========================================================================
// ⑤ ENCOURAGEMENT POPUPS
//
// At score milestones, a CSS-animated text element pops up, bounces,
// then floats upward and fades — classic "juice" feedback for kids.
// =========================================================================

function checkMilestone(s) {
  if (ENC_MSGS[s] && !shownMilestones.has(s)) {
    shownMilestones.add(s);
    showEncouragement(ENC_MSGS[s]);
  }
}

function showEncouragement(text) {
  clearTimeout(encTimer);
  elEnc.classList.remove('show');
  elEnc.classList.add('off');
  // Force reflow so the animation re-triggers if back-to-back milestones
  void elEnc.offsetWidth;
  elEnc.textContent = text;
  elEnc.classList.remove('off');
  elEnc.classList.add('show');
  encTimer = setTimeout(() => {
    elEnc.classList.remove('show');
    elEnc.classList.add('off');
  }, 3200);
}

// =========================================================================
// PARTICLES — ripple on food eaten
// =========================================================================

function spawnRipple(gx,gy){
  const px=gx*CS+CS/2, py=gy*CS+CS/2;
  for(let i=0;i<14;i++){
    const a=(i/14)*Math.PI*2, spd=(1.8+Math.random()*2.2)*(CS/22);
    const life=28+(Math.random()*18)|0;
    particles.push({type:'dot',x:px,y:py,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:(2+Math.random()*1.8)*(CS/22),life,maxLife:life,col:Math.random()>.5?C_FOOD:C_FOOD2});
  }
  particles.push({type:'ring',x:px,y:py,rCur:CS*.4,rMax:CS*2.8,life:28,maxLife:28,col:C_FOOD2});
}

function tickParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    if(p.type==='dot'){p.x+=p.vx;p.y+=p.vy;p.vx*=.91;p.vy*=.91;}
    else{p.rCur+=(p.rMax-CS*.4)/p.maxLife;}
  }
}

function drawParticles(){
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    ctx.save();ctx.globalAlpha=a;ctx.shadowColor=p.col;
    if(p.type==='ring'){
      ctx.shadowBlur=10;ctx.strokeStyle=p.col;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(p.x,p.y,p.rCur,0,Math.PI*2);ctx.stroke();
    }else{
      ctx.shadowBlur=12;ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });
}

// =========================================================================
// GLITCH
// =========================================================================

function startGlitch(){glitch={frame:0,total:40};}

function drawGlitch(){
  if(!glitch)return;
  glitch.frame++;
  if(glitch.frame>glitch.total){glitch=null;return;}
  const t=1-glitch.frame/glitch.total;
  for(let i=0;i<7;i++){
    const sy=(Math.random()*canvas.height)|0,sh=3+(Math.random()*18)|0,ox=((Math.random()-.5)*28*t)|0;
    try{const d=ctx.getImageData(0,sy,canvas.width,sh);ctx.putImageData(d,ox,sy);}catch(_){}
    ctx.save();ctx.globalAlpha=.28*t*Math.random();
    ctx.fillStyle=i%2?`rgba(0,242,254,.6)`:`rgba(244,114,182,.6)`;
    ctx.fillRect(ox,sy,canvas.width,sh);ctx.restore();
  }
  ctx.save();ctx.globalAlpha=.1*t;
  for(let i=0;i<180;i++){
    ctx.fillStyle=`rgba(255,255,255,${Math.random()})`;
    ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,1+Math.random()*2.5,1+Math.random()*2.5);
  }
  ctx.restore();
}

// =========================================================================
// ③ FLOATING HEARTS
//
// 8 translucent pink hearts drift slowly upward with a gentle sine sway.
// Positions are stored as fractions (0..1) of canvas dimensions so they
// survive canvas resizes without recalculation of pixel coords.
// Drawn below the grid so they never obscure gameplay.
// =========================================================================

function initHearts() {
  hearts = [];
  for (let i = 0; i < 8; i++) {
    hearts.push({
      fx:    Math.random(),
      fy:    0.05 + Math.random() * 0.95,
      fvy:  -(0.00045 + Math.random() * 0.0006),  // upward drift speed
      fvx:   (Math.random() - 0.5) * 0.0001,      // gentle horizontal
      fsize:  0.013 + Math.random() * 0.014,       // as fraction of canvas min-dim
      alpha:  0.09 + Math.random() * 0.13,
      phase:  Math.random() * Math.PI * 2,
    });
  }
}

/**
 * drawHeartPath — draws a heart centred at (cx,cy) with half-width r.
 * Uses two mirrored bezier arcs meeting at the bottom point.
 */
function drawHeartPath(cx, cy, r) {
  ctx.beginPath();
  ctx.moveTo(cx, cy + r * 0.35);
  // Left arc
  ctx.bezierCurveTo(cx, cy + r*0.12, cx - r*0.05, cy,      cx - r*0.5, cy);
  ctx.bezierCurveTo(cx - r,           cy,          cx - r,  cy + r*0.5, cx - r*0.5, cy + r*0.72);
  ctx.lineTo(cx, cy + r);
  // Right arc (mirror)
  ctx.lineTo(cx + r*0.5, cy + r*0.72);
  ctx.bezierCurveTo(cx + r, cy + r*0.5, cx + r, cy, cx + r*0.5, cy);
  ctx.bezierCurveTo(cx + r*0.05, cy, cx, cy + r*0.12, cx, cy + r*0.35);
  ctx.closePath();
}

function drawFloatingHearts() {
  const minDim = Math.min(canvas.width, canvas.height);
  hearts.forEach(h => {
    // Update position each frame (very slow drift)
    h.fy  += h.fvy;
    h.fx  += h.fvx + Math.sin(h.phase + foodPhase * 0.18) * 0.00018;
    h.phase += 0.008;

    // Wrap: reset to bottom when off-top, horizontal wrap
    if (h.fy < -0.06) { h.fy = 1.06; h.fx = Math.random(); }
    if (h.fx < -0.08) h.fx = 1.08;
    if (h.fx >  1.08) h.fx = -0.08;

    const px = h.fx * canvas.width;
    const py = h.fy * canvas.height;
    const r  = h.fsize * minDim;

    ctx.save();
    ctx.globalAlpha = h.alpha;
    ctx.fillStyle   = '#fda4af';   // soft Morandi-rose
    drawHeartPath(px, py, r);
    ctx.fill();
    ctx.restore();
  });
}

// =========================================================================
// DRAW: grid
// =========================================================================

function drawGrid(){
  ctx.save();ctx.strokeStyle='rgba(79,172,254,.055)';ctx.lineWidth=.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CS,0);ctx.lineTo(x*CS,canvas.height);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CS);ctx.lineTo(canvas.width,y*CS);ctx.stroke();}
  ctx.restore();
}

// =========================================================================
// DRAW: food — pulsing energy orb
// =========================================================================

function drawFood(){
  const cx=food.x*CS+CS/2, cy=food.y*CS+CS/2;
  const r=(CS*.25)+Math.sin(foodPhase)*(CS*.11);
  ctx.save();
  ctx.shadowColor=C_FOOD2;ctx.shadowBlur=(CS*1.0)+Math.sin(foodPhase)*(CS*.36);
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*2.2);
  g.addColorStop(0,'#ffffff');g.addColorStop(.25,C_FOOD);g.addColorStop(1,'rgba(244,114,182,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r*2.2,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=CS*.45;ctx.fillStyle='rgba(255,255,255,.95)';
  ctx.beginPath();ctx.arc(cx,cy,r*.45,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// =========================================================================
// DRAW: snake — flowing colour + glow
// =========================================================================

function drawSnake(){
  const len=snake.length;
  const pad=Math.max(1,(CS*.09)|0);
  const rad=Math.max(2,(CS*.27)|0);
  for(let i=0;i<len;i++){
    const seg=snake[i];const x=seg.x*CS,y=seg.y*CS;
    const t=((i/Math.max(len-1,1))+flowOffset)%1;
    const shimmer=.88+.12*Math.sin(flowOffset*Math.PI*6-i*.35);
    ctx.save();ctx.globalAlpha=shimmer;
    ctx.shadowColor=C_GLOW;ctx.shadowBlur=i===0?CS:Math.max(4,(7+(1-t)*7)*(CS/22));
    ctx.fillStyle=lerp(C_HEAD,C_TAIL,t);
    rr(x+pad,y+pad,CS-pad*2,CS-pad*2,rad);ctx.fill();
    if(i===0){
      ctx.shadowBlur=CS*1.3;ctx.shadowColor='#fff';ctx.globalAlpha=.35;ctx.fillStyle='#ffffff';
      const ip=pad+Math.max(2,(CS*.14)|0);
      rr(x+ip,y+ip,CS-ip*2,CS-ip*2,Math.max(2,rad-2));ctx.fill();
    }
    ctx.restore();
  }
}

// =========================================================================
// ② SNAKE ANTENNAE
//
// Two curved feelers grow from the front face of the head.
// Each antenna is a quadratic Bezier curve ending in a small bright ball.
//
// Coordinate system:
//   fw  = forward unit vector (= current dir)
//   rt  = right perpendicular (= rotate fw 90° CW)
//
// The wobble term — Math.sin(antennaPhase) * CS * 0.12 — shifts the tips
// left/right relative to their resting position, creating an idle sway.
// antennaPhase advances 0.08 rad per rAF (~4.6 Hz at 60 fps).
// =========================================================================

function drawAntennae() {
  if (!snake || snake.length === 0 || CS < 13) return;

  const seg = snake[0];
  const hcx = seg.x * CS + CS / 2;
  const hcy = seg.y * CS + CS / 2;

  // Forward and perpendicular (right) unit vectors
  const fwx = dir.x, fwy = dir.y;
  const rtx = -dir.y, rty = dir.x;

  const wobble  = Math.sin(antennaPhase) * CS * 0.12;
  const spread  = CS * 0.22;    // lateral distance from head centre
  const lenFwd  = CS * 0.58;    // how far the tip extends forward
  const tipR    = Math.max(1.5, CS * 0.088);
  const lineW   = Math.max(1,   CS * 0.062);

  [-1, 1].forEach(side => {
    // Root: on the front face of the head, offset ±perpendicular
    const rx = hcx + fwx * CS * 0.28 + rtx * spread * side;
    const ry = hcy + fwy * CS * 0.28 + rty * spread * side;

    // Tip: further forward + outward, plus time-varying wobble
    const tx = rx + fwx * lenFwd * 0.62 + rtx * (spread * 0.72 + wobble) * side;
    const ty = ry + fwy * lenFwd * 0.62 + rty * (spread * 0.72 + wobble) * side;

    // Bezier control point: arcs gently outward
    const cpx = rx + fwx * lenFwd * 0.38 + rtx * spread * 0.28 * side;
    const cpy = ry + fwy * lenFwd * 0.38 + rty * spread * 0.28 * side;

    ctx.save();

    // Antenna stem
    ctx.strokeStyle  = C_HEAD;
    ctx.shadowColor  = C_HEAD;
    ctx.shadowBlur   = Math.max(3, CS * 0.26);
    ctx.lineWidth    = lineW;
    ctx.lineCap      = 'round';
    ctx.beginPath();
    ctx.moveTo(rx, ry);
    ctx.quadraticCurveTo(cpx, cpy, tx, ty);
    ctx.stroke();

    // Tip ball — brighter white dot for the "antenna node" look
    ctx.shadowBlur   = Math.max(5, CS * 0.42);
    ctx.shadowColor  = '#ffffff';
    ctx.fillStyle    = '#ffffff';
    ctx.beginPath();
    ctx.arc(tx, ty, tipR, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  });
}

// =========================================================================
// VIGNETTE
// =========================================================================

function drawVignette(){
  const g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*.25,canvas.width/2,canvas.height/2,canvas.height*.75);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.45)');
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
}

// =========================================================================
// MAIN RENDER LOOP
// =========================================================================

function frame(ts) {
  foodPhase    += 0.052;
  antennaPhase += 0.08;   // antenna wobble — faster than food pulse

  // ① Clear
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='rgba(4,6,15,.98)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ② Floating hearts — drawn BELOW the grid for layered depth
  drawFloatingHearts();

  // ③ Grid
  drawGrid();

  // ④ Particles (ripple effects)
  tickParticles(); drawParticles();

  // ⑤ Food
  drawFood();

  // ⑥ Snake body
  drawSnake();

  // ⑦ Antennae on top of snake
  drawAntennae();

  // ⑧ Vignette
  drawVignette();

  // ⑨ Glitch (game-over effect)
  drawGlitch();

  // ⑩ Game logic tick (skipped when paused)
  if (running && !paused && ts - lastTick >= interval) {
    lastTick = ts;
    tick();
  }

  requestAnimationFrame(frame);
}

// =========================================================================
// GAME TICK
// =========================================================================

function tick(){
  dir = nextDir;
  flowOffset = (flowOffset + 0.045) % 1;

  const h  = snake[0];
  const nx = h.x + dir.x, ny = h.y + dir.y;

  if (nx<0||nx>=COLS||ny<0||ny>=ROWS) { die(); return; }
  if (snake.some(s=>s.x===nx&&s.y===ny)) { die(); return; }

  snake.unshift({x:nx,y:ny});

  if (nx===food.x && ny===food.y) {
    addScore(10);
    playEat();                // ← eat sound
    spawnRipple(food.x,food.y);
    spawnFood();
  } else {
    snake.pop();
  }
}

// =========================================================================
// GAME OVER
// =========================================================================

function die(){
  running = false;
  updatePauseBtn();
  playDeath();     // ← death sound
  startGlitch();
  setTimeout(()=>{
    elFinal.textContent=`Score: ${score}`;
    elRecord.style.display=(score>0&&score===best)?'block':'none';
    ovEnd.classList.remove('off');
  }, 650);
}

// =========================================================================
// START / RESTART
// =========================================================================

function startGame(){
  initAudio();   // unlock AudioContext on user gesture
  ovStart.classList.add('off');
  ovEnd.classList.add('off');
  ovPause.classList.add('off');
  paused = false;
  init();
  running  = true;
  lastTick = performance.now();
  updatePauseBtn();
}

// =========================================================================
// ④ PAUSE / RESUME
// =========================================================================

function pauseGame() {
  if (!running || paused) return;
  paused = true;
  ovPause.classList.remove('off');
  btnPause.textContent = '▶ 繼續';
}

function resumeGame() {
  if (!paused) return;
  paused   = false;
  lastTick = performance.now();  // prevent tick accumulation while paused
  ovPause.classList.add('off');
  btnPause.textContent = '🌸 休息一下';
}

function updatePauseBtn() {
  btnPause.classList.toggle('show', running);
}

// Clicking the pause overlay (anywhere on it) also resumes
ovPause.addEventListener('click', resumeGame);

btnPause.addEventListener('click', e => {
  e.stopPropagation();
  initAudio();
  paused ? resumeGame() : pauseGame();
});

btnResume.addEventListener('click', e => { e.stopPropagation(); resumeGame(); });

// =========================================================================
// INPUT — Keyboard
// =========================================================================

document.addEventListener('keydown', e => {
  // Space / Escape: toggle pause
  if (e.key === ' ' || e.key === 'Escape') {
    e.preventDefault();
    if (!running) return;
    paused ? resumeGame() : pauseGame();
    return;
  }
  switch(e.key){
    case'ArrowUp':   case'w':case'W': e.preventDefault(); if(dir.y!== 1) nextDir={x:0,y:-1}; break;
    case'ArrowDown': case's':case'S': e.preventDefault(); if(dir.y!==-1) nextDir={x:0,y: 1}; break;
    case'ArrowLeft': case'a':case'A': e.preventDefault(); if(dir.x!== 1) nextDir={x:-1,y:0}; break;
    case'ArrowRight':case'd':case'D': e.preventDefault(); if(dir.x!==-1) nextDir={x: 1,y:0}; break;
  }
});

// =========================================================================
// INPUT — Swipe on canvas
// =========================================================================

let ts0 = null;
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  ts0 = {x:t.clientX, y:t.clientY};
}, {passive:true});

canvas.addEventListener('touchend', e => {
  if (!ts0) return;
  const t  = e.changedTouches[0];
  const dx = t.clientX - ts0.x, dy = t.clientY - ts0.y;
  ts0 = null;
  if (Math.abs(dx)<10 && Math.abs(dy)<10) return;
  if (Math.abs(dx) > Math.abs(dy)){
    if (dx>0  && dir.x!==-1) nextDir={x:1,y:0};
    else if (dx<0 && dir.x!==1)  nextDir={x:-1,y:0};
  } else {
    if (dy>0  && dir.y!==-1) nextDir={x:0,y:1};
    else if (dy<0 && dir.y!==1)  nextDir={x:0,y:-1};
  }
}, {passive:true});

// =========================================================================
// INPUT — D-Pad
// =========================================================================

const DPAD = {
  dpUp:    ()=>{ if(dir.y!== 1) nextDir={x:0,y:-1}; },
  dpDown:  ()=>{ if(dir.y!==-1) nextDir={x:0,y: 1}; },
  dpLeft:  ()=>{ if(dir.x!== 1) nextDir={x:-1,y:0}; },
  dpRight: ()=>{ if(dir.x!==-1) nextDir={x: 1,y:0}; },
};
Object.entries(DPAD).forEach(([id,fn])=>{
  const btn=document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('touchstart',e=>{e.preventDefault();initAudio();fn();btn.classList.add('pressed');},{passive:false});
  btn.addEventListener('touchend',()=>btn.classList.remove('pressed'),{passive:true});
  btn.addEventListener('mousedown',()=>{initAudio();fn();});
});

// =========================================================================
// TOUCH HINT & BUTTON WIRING
// =========================================================================

if (window.matchMedia('(pointer:coarse)').matches)
  ovHint.textContent = 'D-Pad 或滑動控制 🎮';

btnStart.addEventListener('click', startGame);
btnRestart.addEventListener('click', startGame);

// =========================================================================
// SERVICE WORKER
// =========================================================================

if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('./sw.js')
    .then(r=>console.log('[SW] scope:',r.scope))
    .catch(e=>console.warn('[SW] failed:',e));
}

// =========================================================================
// BOOTSTRAP
// =========================================================================

applyResize();
initHearts();
init();
running = false;
requestAnimationFrame(frame);

})();
</script>
</body>
</html>
