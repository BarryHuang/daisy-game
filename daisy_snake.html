<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Daisy's Rainbow Worm 🐛</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffdee9" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="彩虹蟲蟲" />
  <link rel="apple-touch-icon" href="snake_icon.svg" />
  <!-- Bubblegum Sans — round, sticker-like, perfect for kids -->
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --pink:    #FF6B9E;
      --lpink:   #FFB6C1;
      --blue:    #B5DEFF;
      --mint:    #B5FFD4;
      --yellow:  #FFF9B5;
      --peach:   #FFD6A5;
      --purple:  #E8B4FF;
      --white:   #ffffff;
      --cream:   #FFF8FC;
    }

    html {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    html, body { width:100%; height:100%; overflow:hidden; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       PASTEL GRADIENT BACKGROUND
       Soft #FFDEE9 → #B5FFFC gradient,
       dreamy and eye-friendly for kids.
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    body {
      font-family: 'Bubblegum Sans', 'Nunito', cursive;
      background: linear-gradient(135deg, #FFDEE9 0%, #e8f4ff 50%, #B5FFFC 100%);
      background-attachment: fixed;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding:
        env(safe-area-inset-top,8px) env(safe-area-inset-right,8px)
        env(safe-area-inset-bottom,8px) env(safe-area-inset-left,8px);
      position: relative;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       FLOATING BACKGROUND DECORATIONS
       CSS-animated emojis drifting upward —
       pure cosmetic layer, pointer-events:none.
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .bg-floaters {
      position: fixed; inset: 0;
      pointer-events: none; overflow: hidden;
      z-index: 0;
    }
    .bg-floaters span {
      position: absolute;
      bottom: -60px;
      font-size: 1.6rem;
      opacity: 0;
      animation: floatUp linear infinite;
      user-select: none;
    }
    /* Each floater gets different x-position, duration, delay */
    .bg-floaters span:nth-child(1)  { left:4%;   animation-duration:9s;  animation-delay:0s;   }
    .bg-floaters span:nth-child(2)  { left:12%;  animation-duration:11s; animation-delay:-3s;  }
    .bg-floaters span:nth-child(3)  { left:21%;  animation-duration:8s;  animation-delay:-6s;  }
    .bg-floaters span:nth-child(4)  { left:32%;  animation-duration:13s; animation-delay:-1s;  }
    .bg-floaters span:nth-child(5)  { left:42%;  animation-duration:10s; animation-delay:-7s;  }
    .bg-floaters span:nth-child(6)  { left:53%;  animation-duration:12s; animation-delay:-4s;  }
    .bg-floaters span:nth-child(7)  { left:63%;  animation-duration:9s;  animation-delay:-9s;  }
    .bg-floaters span:nth-child(8)  { left:72%;  animation-duration:11s; animation-delay:-2s;  }
    .bg-floaters span:nth-child(9)  { left:82%;  animation-duration:8s;  animation-delay:-5s;  }
    .bg-floaters span:nth-child(10) { left:91%;  animation-duration:14s; animation-delay:-8s;  }
    @keyframes floatUp {
      0%   { transform: translateY(0)     rotate(-8deg)  scale(0.8); opacity: 0; }
      10%  { opacity: 0.28; }
      90%  { opacity: 0.18; }
      100% { transform: translateY(-110vh) rotate(12deg) scale(1.1); opacity: 0; }
    }

    /* ── Wrapper ── */
    .wrapper {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center;
      gap: 10px; width: 100%;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       STICKER-STYLE TITLE
       'Bubblegum Sans' + white text-stroke
       mimics the look of a puffy sticker.
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .title {
      font-family: 'Bubblegum Sans', cursive;
      font-size: clamp(1.25rem, 5vw, 2.2rem);
      color: var(--pink);
      /* White stroke = sticker outline */
      -webkit-text-stroke: 3px white;
      paint-order: stroke fill;
      text-shadow: 0 3px 8px rgba(255,107,158,0.25);
      letter-spacing: 0.04em;
      user-select: none;
      animation: titleWiggle 3s ease-in-out infinite;
    }
    @keyframes titleWiggle {
      0%,100% { transform: rotate(-1.5deg) scale(1);    }
      50%      { transform: rotate( 1.5deg) scale(1.03); }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       HUD — "糖果數量 🍬" theme
       White frosted glass pill with pink border.
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .hud {
      display: flex; gap: clamp(12px,4vw,28px);
      padding: 8px clamp(14px,4vw,28px);
      background: rgba(255,255,255,0.75);
      border: 2.5px solid var(--lpink);
      border-radius: 999px;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 20px rgba(255,182,193,0.35), 0 2px 6px rgba(0,0,0,0.06);
    }
    .hud-item { display:flex; flex-direction:column; align-items:center; gap:0px; }
    .hud-label {
      font-family: 'Bubblegum Sans', cursive;
      font-size: clamp(.55rem,.9vw,.62rem);
      color: #FF8FB1; letter-spacing:.08em;
    }
    .hud-value {
      font-family: 'Bubblegum Sans', cursive;
      font-size: clamp(1rem,3.5vw,1.5rem);
      color: var(--pink);
      -webkit-text-stroke: 1.5px white;
      paint-order: stroke fill;
      min-width: 3ch; text-align: center;
      transition: transform .15s ease;
    }
    .hud-value.bump { transform: scale(1.4); }
    .speed-track {
      width: clamp(48px,10vw,80px); height: 5px;
      background: rgba(255,182,193,0.25);
      border-radius: 3px; overflow: hidden; margin-top: 5px;
    }
    .speed-fill {
      height: 100%; width: 4%;
      background: linear-gradient(90deg, var(--pink), #FF8FB1);
      border-radius: 3px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CANVAS SHELL — candy bead border
       Uses background-clip padding-box / border-box
       trick to paint a rainbow gradient border
       that looks like coloured candy beads.
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .canvas-shell {
      position: relative;
      padding: 12px;
      background:
        rgba(255,255,255,0.95) padding-box,
        linear-gradient(
          60deg,
          #FF9EBC, #FFD6B0, #FFFAB5, #B5FFD4, #B5DEFF, #D4B5FF, #FF9EBC
        ) border-box;
      border: 7px solid transparent;
      border-radius: 26px;
      box-shadow:
        0 10px 40px rgba(255,182,193,0.35),
        0 4px 16px rgba(0,0,0,0.06),
        inset 0 1px 0 rgba(255,255,255,0.9);
    }
    #c { display:block; border-radius:10px; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       OVERLAYS — cream glass with cute deco
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .overlay {
      position: absolute; inset: 12px; border-radius: 12px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: rgba(255,250,252,0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      z-index: 20; transition: opacity .4s ease;
    }
    .overlay.off { opacity:0; pointer-events:none; }

    /* Decorative flower/hearts row at top of overlay */
    .ov-deco {
      font-size: clamp(1.1rem, 3.5vw, 1.6rem);
      letter-spacing: .25em;
      animation: decoFloat .8s ease-in-out infinite alternate;
    }
    @keyframes decoFloat { from{transform:translateY(0)} to{transform:translateY(-5px)} }

    .ov-title {
      font-family: 'Bubblegum Sans', cursive;
      font-size: clamp(1.4rem,5.5vw,2.5rem);
      color: var(--pink);
      -webkit-text-stroke: 3px white;
      paint-order: stroke fill;
      text-shadow: 0 4px 12px rgba(255,107,158,0.2);
      letter-spacing: .06em;
      text-align: center;
    }
    .ov-sub {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(.72rem,2vw,.9rem);
      color: #FF8FB1;
    }
    .ov-final {
      font-family: 'Bubblegum Sans', cursive;
      font-size: clamp(.95rem,3vw,1.3rem);
      color: #FF6BAE;
      text-align: center;
    }
    .ov-record {
      font-family: 'Bubblegum Sans', cursive;
      font-size: .82rem; letter-spacing:.14em;
      color: #FF6BAE;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CANDY BUTTON
       Bright pink, round, breathing scale-pulse.
       --pulse-on class triggers the breathing.
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .btn {
      position: relative;
      padding: clamp(10px,2.2vh,14px) clamp(26px,7vw,48px);
      font-family: 'Bubblegum Sans', cursive;
      font-size: clamp(.7rem,2vw,.85rem);
      letter-spacing: .18em;
      color: white;
      background: linear-gradient(135deg, #FF6B9E, #FF9EBC);
      border: 3px solid white;
      border-radius: 999px;
      cursor: pointer; overflow: hidden;
      box-shadow:
        0 4px 0 #d44d7e,
        0 6px 20px rgba(255,107,158,0.45);
      transition: transform .15s ease, box-shadow .15s ease;
      -webkit-tap-highlight-color: transparent;
      /* Breathing animation — makes the start button inviting */
      animation: btnBreathe 1.8s ease-in-out infinite;
    }
    @keyframes btnBreathe {
      0%,100% { transform: scale(1);    box-shadow: 0 4px 0 #d44d7e, 0 6px 20px rgba(255,107,158,.45); }
      50%      { transform: scale(1.06); box-shadow: 0 4px 0 #d44d7e, 0 8px 28px rgba(255,107,158,.60); }
    }
    .btn:active {
      transform: scale(.96) translateY(2px) !important;
      box-shadow: 0 2px 0 #d44d7e, 0 4px 12px rgba(255,107,158,.3) !important;
      animation: none;
    }

    /* ── Pause button — softer, rose tones ── */
    .pause-btn {
      display: none;
      padding: 7px 20px;
      font-family: 'Bubblegum Sans', cursive;
      font-size: clamp(.72rem,2.5vw,.85rem);
      color: var(--pink);
      background: rgba(255,255,255,0.8);
      border: 2px solid var(--lpink);
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 10px rgba(255,182,193,.3);
      transition: all .2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .pause-btn.show { display: block; }
    .pause-btn:hover, .pause-btn:active {
      background: rgba(255,255,255,1);
      border-color: var(--pink);
      box-shadow: 0 3px 16px rgba(255,107,158,.35);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       ENCOURAGEMENT POPUP
       Sticker-style text bouncing in from below.
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .encourage {
      position: fixed;
      top: 15%; left: 50%; transform: translateX(-50%);
      white-space: nowrap;
      font-family: 'Bubblegum Sans', cursive;
      font-size: clamp(1.2rem, 5vw, 2rem);
      color: var(--pink);
      -webkit-text-stroke: 3px white;
      paint-order: stroke fill;
      text-shadow: 0 4px 12px rgba(255,107,158,.3);
      z-index: 300; pointer-events: none;
    }
    .encourage.off  { display: none; }
    .encourage.show { display: block; animation: encPop 3.2s ease forwards; }
    @keyframes encPop {
      0%   { opacity:0; transform:translateX(-50%) scale(.5) translateY(20px); }
      18%  { opacity:1; transform:translateX(-50%) scale(1.25) translateY(-8px); }
      28%  { transform:translateX(-50%) scale(1) translateY(0); }
      72%  { opacity:1; }
      100% { opacity:0; transform:translateX(-50%) scale(.9) translateY(-24px); }
    }

    /* ── D-Pad ── */
    .dpad {
      display:none;
      grid-template-areas:". up ." "left . right" ". down .";
      grid-template-columns:repeat(3,1fr);
      grid-template-rows:repeat(3,1fr);
      gap:6px; width:192px; height:192px;
    }
    @media(pointer:coarse),(max-width:600px){ .dpad{display:grid;} }
    @media(pointer:coarse)and(orientation:landscape)and(max-height:500px){ .dpad{display:none;} }

    .dpad-btn {
      display:flex; align-items:center; justify-content:center;
      background: rgba(255,255,255,0.75);
      border: 2.5px solid var(--lpink);
      border-radius: 14px;
      color: var(--pink); font-size: 1.3rem;
      cursor:pointer; user-select:none; touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      box-shadow: 0 3px 0 rgba(255,107,158,.25);
      transition: background .08s, border-color .08s, transform .08s;
      backdrop-filter: blur(6px);
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: rgba(255,107,158,.15);
      border-color: var(--pink);
      transform: scale(.93);
      box-shadow: 0 1px 0 rgba(255,107,158,.2);
    }
    .dp-up{grid-area:up;} .dp-left{grid-area:left;} .dp-right{grid-area:right;} .dp-down{grid-area:down;}
  </style>
</head>
<body>

<!-- Floating background decorations (CSS animated) -->
<div class="bg-floaters" aria-hidden="true">
  <span>💕</span><span>⭐</span><span>🌸</span><span>🍬</span>
  <span>☁️</span><span>💫</span><span>🌈</span><span>🎀</span>
  <span>✨</span><span>💖</span>
</div>

<!-- Encouragement popup -->
<div class="encourage off" id="elEncourage"></div>

<div class="wrapper">

  <h1 class="title">🐛 Daisy's Rainbow Worm 🌈</h1>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">🍬 糖果數量</span>
      <span class="hud-value" id="elScore">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">🏆 最高紀錄</span>
      <span class="hud-value" id="elBest">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">🚀 速度</span>
      <div class="speed-track"><div class="speed-fill" id="elSpeedBar"></div></div>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-shell">
    <canvas id="c"></canvas>

    <!-- Start overlay -->
    <div class="overlay" id="ovStart">
      <div class="ov-deco">🌸 🐛 🌟 🍬 🌈</div>
      <div class="ov-title">彩虹蟲蟲大冒險！</div>
      <div class="ov-sub" id="ovHint">用方向鍵或 WASD 移動 🎮</div>
      <button class="btn" id="btnStart">開始玩！🎉</button>
    </div>

    <!-- Game over overlay -->
    <div class="overlay off" id="ovEnd">
      <div class="ov-deco">🌸 💖 🌸 💖 🌸</div>
      <div class="ov-title">哇！你好棒！🌟</div>
      <div class="ov-final" id="elFinal">你收集了 0 個糖果！</div>
      <div class="ov-record" id="elRecord" style="display:none">✨ 新紀錄！太厲害了！✨</div>
      <button class="btn" id="btnRestart">再玩一次！🎀</button>
    </div>

    <!-- Pause overlay -->
    <div class="overlay off" id="ovPause">
      <div class="ov-deco">💤 🌙 ⭐ 🌙 💤</div>
      <div class="ov-title" style="font-size:clamp(1.3rem,4.5vw,2rem)">小公主休息中...</div>
      <div class="ov-sub">點擊任何地方繼續 🌸</div>
      <button class="btn" id="btnResume">繼續玩！▶</button>
    </div>
  </div>

  <button class="pause-btn" id="btnPause">🌸 休息一下</button>

  <!-- D-Pad -->
  <div class="dpad">
    <button class="dpad-btn dp-up"    id="dpUp">▲</button>
    <button class="dpad-btn dp-left"  id="dpLeft">◀</button>
    <button class="dpad-btn dp-right" id="dpRight">▶</button>
    <button class="dpad-btn dp-down"  id="dpDown">▼</button>
  </div>

</div>

<script>
/* =========================================================================
   Daisy's Rainbow Worm — Cute & Girly Edition 🐛🌈
   Visual design: pastel, candy bead border, emoji food, rainbow snake,
   cute face on head, golden sparkle particles, soft game-over.
   ========================================================================= */
(() => {
'use strict';

// ── Grid ──────────────────────────────────────────────────────────────────
const COLS = 25, ROWS = 25;
// Kid-friendly speed: very slow start, gentle ramp, moderate max.
const SPD_BASE = 180, SPD_MIN = 90;
const SCORE_FOR_MAX = 200;

let CS = 22;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RAINBOW COLOUR PALETTE for snake body segments.
// Cycles continuously: pink → peach → yellow →
// mint → sky blue → lavender → back to pink.
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const RAINBOW = [
  '#FF9EBC',  // pink
  '#FFBEBC',  // salmon
  '#FFD6A5',  // peach
  '#FFFAB5',  // butter yellow
  '#B5FFD4',  // mint
  '#B5DEFF',  // sky blue
  '#D4B5FF',  // lavender
];

// Food emoji pool — each new food picks one randomly
const FOOD_POOL = ['🌟','🧁','🍓','🍭','🍩','🍰','🌈','💎'];
let foodEmoji = '🌟';

// ── DOM ────────────────────────────────────────────────────────────────────
const canvas    = document.getElementById('c');
const ctx       = canvas.getContext('2d');
const elScore   = document.getElementById('elScore');
const elBest    = document.getElementById('elBest');
const elFinal   = document.getElementById('elFinal');
const elRecord  = document.getElementById('elRecord');
const elSpeed   = document.getElementById('elSpeedBar');
const ovStart   = document.getElementById('ovStart');
const ovEnd     = document.getElementById('ovEnd');
const ovPause   = document.getElementById('ovPause');
const ovHint    = document.getElementById('ovHint');
const btnStart  = document.getElementById('btnStart');
const btnRestart= document.getElementById('btnRestart');
const btnResume = document.getElementById('btnResume');
const btnPause  = document.getElementById('btnPause');
const elEnc     = document.getElementById('elEncourage');

// ── Game state ─────────────────────────────────────────────────────────────
let snake, dir, nextDir, food;
let score = 0, best = 0;
let running = false, paused = false;
let lastTick = 0, interval = SPD_BASE;

// ── Render state ───────────────────────────────────────────────────────────
let foodPhase    = 0;
let antennaPhase = 0;
let particles    = [];

// ── Encouragement ─────────────────────────────────────────────────────────
const ENC = { 10:'妳好棒！🌟', 20:'太厲害了！✨', 30:'超級小天才！🎉', 50:'無敵小公主！👑' };
let shownMilestones = new Set();
let encTimer = null;

// =========================================================================
// ① WEB AUDIO — synthesised sounds
// AudioContext created lazily on first user gesture (autoplay policy).
// =========================================================================

let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

/** Eat — bright "ding!" ascending chime, light and cheerful. */
function playEat() {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = 'sine';
    const t = audioCtx.currentTime;
    osc.frequency.setValueAtTime(880, t);
    osc.frequency.exponentialRampToValueAtTime(1320, t+.08);
    g.gain.setValueAtTime(.28, t);
    g.gain.exponentialRampToValueAtTime(.001, t+.22);
    osc.start(t); osc.stop(t+.22);
  } catch(_) {}
}

/** Death — soft descending "whomp", not scary for kids. */
function playDeath() {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = 'sine';
    const t = audioCtx.currentTime;
    osc.frequency.setValueAtTime(380, t);
    osc.frequency.exponentialRampToValueAtTime(75, t+.85);
    g.gain.setValueAtTime(.22, t);
    g.gain.exponentialRampToValueAtTime(.001, t+.95);
    osc.start(t); osc.stop(t+.95);
  } catch(_) {}
}

// =========================================================================
// RESPONSIVE CANVAS SIZING
// =========================================================================

function computeCS() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const isLandscape = vw > vh;
  const isTouch = window.matchMedia('(pointer:coarse)').matches || vw < 600;
  const hasDpad = isTouch && !isLandscape;
  const reserved = 42 + 56 + 34 + 36 + (hasDpad ? 210 : 0);
  const avail = Math.min(vw - 60, vh - reserved);
  CS = Math.max(11, Math.min(22, Math.floor(avail / COLS)));
}

function applyResize() { computeCS(); canvas.width = CS*COLS; canvas.height = CS*ROWS; }

let rTid;
window.addEventListener('resize', ()=>{ clearTimeout(rTid); rTid=setTimeout(applyResize,120); });
window.addEventListener('orientationchange', ()=>setTimeout(applyResize,300));

// =========================================================================
// GAME INIT
// =========================================================================

function init() {
  const cx=COLS>>1, cy=ROWS>>1;
  snake   = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy},{x:cx-3,y:cy}];
  dir     = {x:1,y:0}; nextDir = {x:1,y:0};
  score   = 0; interval = SPD_BASE;
  particles = [];
  shownMilestones.clear();
  spawnFood(); refreshHUD();
}

// =========================================================================
// FOOD
// =========================================================================

function spawnFood() {
  const occ = new Set(snake.map(s=>`${s.x},${s.y}`));
  let x,y;
  do { x=(Math.random()*COLS)|0; y=(Math.random()*ROWS)|0; } while(occ.has(`${x},${y}`));
  food = {x,y};
  foodEmoji = FOOD_POOL[(Math.random()*FOOD_POOL.length)|0];
}

// =========================================================================
// SCORE / HUD
// =========================================================================

function refreshHUD() {
  elScore.textContent = score;
  elBest.textContent  = best;
  const pct = Math.min(100,((SPD_BASE-interval)/(SPD_BASE-SPD_MIN))*100);
  elSpeed.style.width = Math.max(4,pct)+'%';
}

function addScore(pts) {
  score += pts;
  if (score > best) best = score;
  interval = Math.max(SPD_MIN, SPD_BASE - (score/SCORE_FOR_MAX)*(SPD_BASE-SPD_MIN));
  elScore.classList.remove('bump'); void elScore.offsetWidth;
  elScore.classList.add('bump'); setTimeout(()=>elScore.classList.remove('bump'),220);
  refreshHUD(); checkMilestone(score);
}

// =========================================================================
// ENCOURAGEMENT
// =========================================================================

function checkMilestone(s) {
  if (ENC[s] && !shownMilestones.has(s)) {
    shownMilestones.add(s); showEnc(ENC[s]);
  }
}
function showEnc(text) {
  clearTimeout(encTimer);
  elEnc.classList.remove('show'); elEnc.classList.add('off');
  void elEnc.offsetWidth;
  elEnc.textContent = text;
  elEnc.classList.remove('off'); elEnc.classList.add('show');
  encTimer = setTimeout(()=>{ elEnc.classList.remove('show'); elEnc.classList.add('off'); }, 3200);
}

// =========================================================================
// ② PARTICLE SYSTEM — golden sparkles on eat
//
// On food eaten: 18 glittery dot sparks + 4 ✨ emoji floaters + 1 ring.
// All in warm gold / white tones to match the cute theme.
// =========================================================================

const SPARKLE_COLS = ['#FFD700','#FFE566','#FFFACD','#FFACCC','#ffffff'];

function spawnSparkles(gx, gy) {
  const px = gx*CS + CS/2, py = gy*CS + CS/2;

  // Gold dot sparks
  for (let i = 0; i < 18; i++) {
    const a = (i/18)*Math.PI*2;
    const spd = (1.5 + Math.random()*2.5) * (CS/22);
    const life = 22 + (Math.random()*16)|0;
    particles.push({
      type:'dot', x:px, y:py,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      r:(2.2+Math.random()*2)*(CS/22),
      life, maxLife:life,
      col:SPARKLE_COLS[(Math.random()*SPARKLE_COLS.length)|0],
    });
  }
  // Expanding ring
  particles.push({
    type:'ring', x:px, y:py,
    rCur:CS*.3, rMax:CS*2.6,
    life:24, maxLife:24, col:'#FFD700',
  });
  // ✨ emoji floaters
  for (let i = 0; i < 5; i++) {
    const a = (i/5)*Math.PI*2 + Math.PI/10;
    const spd = (.9 + Math.random()) * (CS/22);
    particles.push({
      type:'emoji', x:px, y:py,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd - .5,
      life:36, maxLife:36,
      emoji:Math.random()>.5 ? '✨' : '⭐',
      size:CS*.7,
    });
  }
}

function tickParticles() {
  for (let i = particles.length-1; i>=0; i--) {
    const p = particles[i]; p.life--;
    if (p.life<=0) { particles.splice(i,1); continue; }
    if (p.type==='dot')   { p.x+=p.vx; p.y+=p.vy; p.vx*=.90; p.vy*=.90; }
    else if (p.type==='ring') { p.rCur+=(p.rMax-CS*.3)/p.maxLife; }
    else if (p.type==='emoji'){ p.x+=p.vx; p.y+=p.vy; p.vy-=.04; }
  }
}

function drawParticles() {
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.save(); ctx.globalAlpha = a;
    if (p.type==='dot') {
      ctx.shadowColor = p.col; ctx.shadowBlur = 8;
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2); ctx.fill();
    } else if (p.type==='ring') {
      ctx.strokeStyle = p.col; ctx.lineWidth = 2;
      ctx.shadowColor = p.col; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.rCur,0,Math.PI*2); ctx.stroke();
    } else if (p.type==='emoji') {
      ctx.font = `${p.size*a}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.emoji, p.x, p.y);
    }
    ctx.restore();
  });
}

// =========================================================================
// DRAW: soft polka-dot background for canvas
// =========================================================================

function drawBackground() {
  // Light cream-pink fill
  ctx.fillStyle = '#FFF5FA';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Subtle polka dots at each cell centre — looks playful, not grid-like
  ctx.fillStyle = 'rgba(255,182,193,0.16)';
  for (let x=0; x<COLS; x++) {
    for (let y=0; y<ROWS; y++) {
      ctx.beginPath();
      ctx.arc(x*CS+CS/2, y*CS+CS/2, CS*0.07, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

// =========================================================================
// DRAW: food — pulsing emoji with gentle spin
// =========================================================================
/**
 * Emoji rendered via canvas fillText.
 * Scale oscillates with Math.sin(foodPhase): "breathing" effect.
 * A slight rotation sway adds life.
 */
function drawFood() {
  const cx = food.x*CS + CS/2;
  const cy = food.y*CS + CS/2;
  const sz = CS * 0.88;
  const scale = 1 + Math.sin(foodPhase) * 0.11;
  const rot   = Math.sin(foodPhase * .6) * 0.18;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.rotate(rot);
  ctx.font = `${sz}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(foodEmoji, 0, 0);
  ctx.restore();
}

// =========================================================================
// DRAW: rainbow worm body
// Each segment is a circle (not a rect), colour picked from RAINBOW[].
// A white shine dot at top-left fakes a 3D candy-ball look.
// =========================================================================

function drawSnake() {
  const len = snake.length;
  const r   = Math.max(4, CS * 0.44);  // segment radius

  for (let i = len-1; i >= 0; i--) {
    const seg = snake[i];
    const cx = seg.x*CS + CS/2;
    const cy = seg.y*CS + CS/2;
    const col = RAINBOW[i % RAINBOW.length];

    ctx.save();
    // Soft shadow matching segment colour
    ctx.shadowColor = col;
    ctx.shadowBlur  = 7;
    ctx.fillStyle   = col;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

    // Candy-ball shine: small white highlight offset toward top-left
    ctx.shadowBlur = 0;
    ctx.fillStyle  = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.arc(cx - r*.26, cy - r*.26, r*.32, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }
}

// =========================================================================
// ③ DRAW: cute snake head
//
// Uses ctx.save() + translate + rotate to work in a "face-local" frame
// where +x is the forward direction.  All features (eyes, cheeks, smile)
// are defined in this frame and transform automatically with the direction.
//
// Face anatomy:
//   Eyes  — two white circles with dark pupils + sparkle dot
//   Blush — two semi-transparent rosy circles under the eyes
//   Smile — arc drawn at ctx.arc(forward, down, radius, 0, π)
//   Antennae — two quadratic bezier feelers wobbling via sin(antennaPhase)
// =========================================================================

function drawHead() {
  if (!snake || !snake.length) return;
  const seg = snake[0];
  const cx  = seg.x*CS + CS/2;
  const cy  = seg.y*CS + CS/2;
  const r   = Math.max(4, CS * 0.46);  // head slightly larger than body

  ctx.save();
  ctx.translate(cx, cy);
  // Rotate so that local +x always points in the movement direction
  ctx.rotate(Math.atan2(dir.y, dir.x));
  // Now: forward = +x, right = +y

  // ── Head circle ─────────────────────────────────��────────────
  ctx.shadowColor = '#FF9EBC'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#FF9EBC';
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();

  // ── Shine ────────────────────────────────────────────────────
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(-r*.2, -r*.25, r*.33, 0, Math.PI*2); ctx.fill();

  // ── Eyes (left eye: y=-0.30r, right eye: y=+0.30r) ──────────
  [-0.3, 0.3].forEach(side => {
    const ex = r * 0.25, ey = r * side;
    // White sclera
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(ex, ey, r*.24, 0, Math.PI*2); ctx.fill();
    // Pupil (slightly forward = +x)
    ctx.fillStyle = '#2d2d2d';
    ctx.beginPath(); ctx.arc(ex + r*.07, ey, r*.13, 0, Math.PI*2); ctx.fill();
    // Catchlight (bright sparkle top-right of pupil)
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(ex + r*.10, ey - r*.08, r*.055, 0, Math.PI*2); ctx.fill();
  });

  // ── Rosy cheeks (below & outward from eyes) ──────────────────
  [-0.38, 0.38].forEach(side => {
    ctx.fillStyle = 'rgba(255,120,140,0.28)';
    ctx.beginPath(); ctx.arc(r*.02, r*side, r*.22, 0, Math.PI*2); ctx.fill();
  });

  // ── Smile arc (U-shape at the front of the head) ─────────────
  ctx.strokeStyle = '#FF6B9E';
  ctx.lineWidth   = Math.max(1, r*.1);
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.arc(r*.12, 0, r*.28, Math.PI*.08, Math.PI*.92);
  ctx.stroke();

  // ── Antennae ─────────────────────────────────────────────────
  if (CS >= 13) {
    const wobble   = Math.sin(antennaPhase) * r * 0.28;
    const lenFwd   = r * 1.05;
    const spread   = r * 0.30;
    const tipR     = Math.max(1.5, r * 0.10);

    [-1, 1].forEach(side => {
      const ry = spread * side;
      // Tip position in face-local space
      const tx = lenFwd * 0.75;
      const ty = ry + wobble * side;

      ctx.strokeStyle = '#FF9EBC';
      ctx.shadowColor = '#FF9EBC';
      ctx.shadowBlur  = 5;
      ctx.lineWidth   = Math.max(1, r * 0.07);
      ctx.beginPath();
      ctx.moveTo(r*.28, ry);
      ctx.quadraticCurveTo(r*.55, ry * .5, tx, ty);
      ctx.stroke();

      // Tip ball
      ctx.shadowColor = 'white'; ctx.shadowBlur = 8;
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(tx, ty, tipR, 0, Math.PI*2); ctx.fill();
    });
  }

  ctx.restore();
}

// =========================================================================
// MAIN RENDER LOOP
// =========================================================================

function frame(ts) {
  foodPhase    += .055;
  antennaPhase += .09;

  drawBackground();
  tickParticles(); drawParticles();
  drawFood();
  drawSnake();
  drawHead();   // head drawn on top of body

  if (running && !paused && ts - lastTick >= interval) {
    lastTick = ts; tick();
  }

  requestAnimationFrame(frame);
}

// =========================================================================
// GAME TICK
// =========================================================================

function tick() {
  dir = nextDir;
  const h = snake[0];
  const nx = h.x + dir.x, ny = h.y + dir.y;

  if (nx<0||nx>=COLS||ny<0||ny>=ROWS) { die(); return; }
  if (snake.some(s=>s.x===nx&&s.y===ny)) { die(); return; }

  snake.unshift({x:nx,y:ny});

  if (nx===food.x && ny===food.y) {
    addScore(10); playEat();
    spawnSparkles(food.x, food.y);
    spawnFood();
  } else {
    snake.pop();
  }
}

// =========================================================================
// GAME OVER — soft fade, no glitch (not scary for kids)
// =========================================================================

function die() {
  running = false;
  updatePauseBtn();
  playDeath();

  // Short delay then show the friendly "哇！你好棒！" overlay
  setTimeout(() => {
    elFinal.textContent = `你收集了 ${score} 個糖果！🍬`;
    elRecord.style.display = (score > 0 && score === best) ? 'block' : 'none';
    ovEnd.classList.remove('off');
  }, 400);
}

// =========================================================================
// START / RESTART
// =========================================================================

function startGame() {
  initAudio();
  ovStart.classList.add('off');
  ovEnd.classList.add('off');
  ovPause.classList.add('off');
  paused = false;
  init();
  running = true; lastTick = performance.now();
  updatePauseBtn();
}

// =========================================================================
// PAUSE / RESUME
// =========================================================================

function pauseGame() {
  if (!running || paused) return;
  paused = true; ovPause.classList.remove('off');
  btnPause.textContent = '▶ 繼續';
}
function resumeGame() {
  if (!paused) return;
  paused = false; lastTick = performance.now();
  ovPause.classList.add('off');
  btnPause.textContent = '🌸 休息一下';
}
function updatePauseBtn() { btnPause.classList.toggle('show', running); }

ovPause.addEventListener('click', resumeGame);
btnPause.addEventListener('click', e => { e.stopPropagation(); initAudio(); paused ? resumeGame() : pauseGame(); });
btnResume.addEventListener('click', e => { e.stopPropagation(); resumeGame(); });

// =========================================================================
// INPUT — Keyboard
// =========================================================================

document.addEventListener('keydown', e => {
  if (e.key===' '||e.key==='Escape') {
    e.preventDefault(); if (!running) return;
    paused ? resumeGame() : pauseGame(); return;
  }
  switch(e.key) {
    case'ArrowUp':   case'w':case'W': e.preventDefault(); if(dir.y!== 1) nextDir={x:0,y:-1}; break;
    case'ArrowDown': case's':case'S': e.preventDefault(); if(dir.y!==-1) nextDir={x:0,y: 1}; break;
    case'ArrowLeft': case'a':case'A': e.preventDefault(); if(dir.x!== 1) nextDir={x:-1,y:0}; break;
    case'ArrowRight':case'd':case'D': e.preventDefault(); if(dir.x!==-1) nextDir={x: 1,y:0}; break;
  }
});

// ── Swipe ─────────────────────────────────────────────────────────────────
let ts0 = null;
canvas.addEventListener('touchstart', e=>{ const t=e.touches[0]; ts0={x:t.clientX,y:t.clientY}; },{passive:true});
canvas.addEventListener('touchend', e=>{
  if(!ts0)return;
  const t=e.changedTouches[0], dx=t.clientX-ts0.x, dy=t.clientY-ts0.y;
  ts0=null;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0&&dir.x!==-1)nextDir={x:1,y:0}; else if(dx<0&&dir.x!==1)nextDir={x:-1,y:0};
  }else{
    if(dy>0&&dir.y!==-1)nextDir={x:0,y:1}; else if(dy<0&&dir.y!==1)nextDir={x:0,y:-1};
  }
},{passive:true});

// ── D-Pad ─────────────────────────────────────────────────────────────────
const DPAD = {
  dpUp:    ()=>{ if(dir.y!== 1) nextDir={x:0,y:-1}; },
  dpDown:  ()=>{ if(dir.y!==-1) nextDir={x:0,y: 1}; },
  dpLeft:  ()=>{ if(dir.x!== 1) nextDir={x:-1,y:0}; },
  dpRight: ()=>{ if(dir.x!==-1) nextDir={x: 1,y:0}; },
};
Object.entries(DPAD).forEach(([id,fn])=>{
  const btn=document.getElementById(id);
  if(!btn)return;
  btn.addEventListener('touchstart',e=>{e.preventDefault();initAudio();fn();btn.classList.add('pressed');},{passive:false});
  btn.addEventListener('touchend',()=>btn.classList.remove('pressed'),{passive:true});
  btn.addEventListener('mousedown',()=>{initAudio();fn();});
});

// ── Touch hint text ──────────���─────────────────────────────────────────────
if (window.matchMedia('(pointer:coarse)').matches)
  ovHint.textContent = 'D-Pad 或滑動來移動 🎮';

// ── Buttons ────────────────────────────────────────────────────────────────
btnStart.addEventListener('click', startGame);
btnRestart.addEventListener('click', startGame);

// ── Service Worker ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ── Bootstrap ─────────────────────────────────────────────────────────────
applyResize();
init();
running = false;
requestAnimationFrame(frame);

})();
</script>
