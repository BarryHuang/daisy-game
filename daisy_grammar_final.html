  .header-card h1 {
    font-size: 20px;
    color: #1565c0;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .header-card .subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 14px;
  }
  .info-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .info-field {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
  }
  .info-field label { font-weight: bold; color: #1565c0; white-space: nowrap; }
  .info-field input {
    border: none;
    border-bottom: 2px solid #90caf9;
    outline: none;
    font-size: 14px;
    padding: 2px 4px;
    width: 120px;
    color: #222;
    background: transparent;
  }

  /* ── Progress bar ── */
  .progress-wrap { margin-top: 4px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
  }
  .progress-bar-bg {
    height: 10px;
    background: #e3f2fd;
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #1565c0, #42a5f5);
    border-radius: 10px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* ── Section header ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 12px;
  }
  .section-badge {
    background: #1565c0;
    color: white;
    font-size: 13px;
    font-weight: bold;
    padding: 5px 14px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .section-title {
    font-size: 15px;
    font-weight: bold;
    color: #333;
    flex: 1;
  }
  .section-score {
    background: #fff3e0;
    border: 1.5px solid #ff9800;
    border-radius: 8px;
    padding: 3px 10px;
    font-size: 13px;
    color: #e65100;
    font-weight: bold;
    white-space: nowrap;
  }

  /* ── Question card ── */
  .q-card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.08);

    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 12px;

    background: #e3f2fd;
    color: #1565c0;
    font-weight: bold;
    font-size: 13px;
    padding: 3px 9px;
    border-radius: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .q-text {
    font-size: 17px;
    line-height: 1.6;
    color: #222;
    font-weight: 500;
  }

  /* ── MCQ options ── */
  .options-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .opt-btn {
    width: 100%;
    min-height: 54px;
    padding: 12px 18px;
    border: 2px solid #b0bec5;
    border-radius: 28px;
    background: #fafafa;
    font-size: 16px;
    color: #333;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s ease;
    -webkit-appearance: none;
    line-height: 1.4;
    display: flex;
    align-items: center;
    gap: 10px;
    touch-action: manipulation;
  }
  .opt-btn:active { transform: scale(0.98); }
  .opt-btn.selected {
    background: #1565c0;
    border-color: #1565c0;
    color: white;
    font-weight: bold;
  }
  .opt-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(0,0,0,0.06);
    font-size: 13px;
    font-weight: bold;
    flex-shrink: 0;
  }
  .opt-btn.selected .opt-letter {
    background: rgba(255,255,255,0.25);
    color: white;
  }

  /* review states */
  .opt-btn.correct {
    background: #2e7d32;
    border-color: #2e7d32;
    color: white;
  }
  .opt-btn.correct .opt-letter { background: rgba(255,255,255,0.25); color: white; }
  .opt-btn.wrong {
    background: #c62828;
    border-color: #c62828;
    color: white;
  }
  .opt-btn.wrong .opt-letter { background: rgba(255,255,255,0.25); color: white; }
  .opt-btn.show-correct {
    background: #e8f5e9;
    border-color: #2e7d32;
    color: #1b5e20;
    font-weight: bold;
  }

  .feedback-tag {
    margin-top: 10px;
    font-size: 14px;
    font-weight: bold;
    padding: 6px 14px;
    border-radius: 20px;
    display: inline-block;
  }
  .feedback-tag.correct-tag { background: #e8f5e9; color: #2e7d32; }
  .feedback-tag.wrong-tag { background: #ffebee; color: #c62828; }

  /* ── Writing part ── */

    background: white;
    border-radius: 14px;

    margin-bottom: 4px;

    color: #888;
    margin-bottom: 10px;

    padding: 10px;
    font-size: 16px;

    outline: none;

  .teacher-badge {

    gap: 4px;

    border: 1px solid #ffb74d;
    color: #e65100;
    font-size: 12px;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 12px;
    margin-top: 8px;

  #submit-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 14px 20px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 -2px 16px rgba(0,0,0,0.12);

    margin: 0 auto;
    height: 56px;
    border: none;
    border-radius: 28px;
    background: linear-gradient(135deg, #1565c0, #0d47a1);

    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 2px;
    touch-action: manipulation;
    -webkit-appearance: none;

    cursor: not-allowed;
    opacity: 0.7;

    .q-text { font-size: 15px; }

</style>
</head>

  { word: 'autumn', hint: '秋天 🍁', prompt: '用 autumn 造一個英文句子：' },
  { word: 'brave', hint: '勇敢的 🦁', prompt: '用 brave 造一個英文句子：' },
  { word: 'spider', hint: '蜘蛛 🕷️', prompt: '用 spider 造一個英文句子：' }
];

// =====================================================================
// STATE
// =====================================================================
let userAnswers = {}; // key: "partIdx_qIdx", value: chosen option string
let writingAnswers = {}; // key: 0,1,2
let submitted = false;

// =====================================================================
// RENDER
// =====================================================================
function buildQuestionKey(partIdx, qIdx) {
  return `${partIdx}_${qIdx}`;
}

function renderExam() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  let globalQ = 1;

  PARTS.forEach((part, partIdx) => {
    // Section header
    const secEl = document.createElement('div');
    secEl.className = 'section-header';
    secEl.innerHTML = `
      <span class="section-badge">Part ${part.id}</span>
      <span class="section-title">${part.title}</span>
      <span class="section-score">${part.score}分</span>
    `;
    container.appendChild(secEl);

    if (part.questions[0] && !part.questions[0].text.includes('What does')) {
      const instr = document.createElement('p');
      instr.style.cssText = 'font-size:14px;color:#666;margin-bottom:10px;font-style:italic;padding-left:4px;';
      instr.textContent = part.instruction;
      container.appendChild(instr);
    }

    part.questions.forEach((q, qIdx) => {
      const key = buildQuestionKey(partIdx, qIdx);
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = `qcard_${key}`;

      const optLetters = ['A', 'B', 'C'];
      const optsHtml = q.options.map((opt, i) => `
        <button class="opt-btn" id="opt_${key}_${i}"
          onclick="selectAnswer('${key}', '${escapeStr(opt)}', ${partIdx}, ${qIdx})"
          data-value="${escapeStr(opt)}">
          <span class="opt-letter">${optLetters[i]}</span>
          <span>${opt}</span>
        </button>
      `).join('');

      card.innerHTML = `
        <div class="q-num-row">
          <span class="q-num-badge">${globalQ}</span>
          <span class="q-text">${q.text}</span>
        </div>
        <div class="options-wrap" id="opts_${key}">
          ${optsHtml}
        </div>
        <div id="feedback_${key}" style="display:none;"></div>
      `;

      container.appendChild(card);
      globalQ++;
    });
  });

  // Writing section
  const writeSec = document.createElement('div');
  writeSec.className = 'section-header';
  writeSec.innerHTML = `
    <span class="section-badge">Part F</span>
    <span class="section-title">造句 Writing — 老師批改</span>
    <span class="section-score">6分</span>
  `;
  container.appendChild(writeSec);

  const writeInstr = document.createElement('p');
  writeInstr.style.cssText = 'font-size:14px;color:#666;margin-bottom:12px;font-style:italic;padding-left:4px;';
  writeInstr.textContent = '用以下單字各造一個英文句子。（老師批改，每題 2 分）';
  container.appendChild(writeInstr);

  WRITING_QUESTIONS.forEach((wq, i) => {
    const wCard = document.createElement('div');
    wCard.className = 'writing-card';
    wCard.innerHTML = `
      <div class="q-num-row">
        <span class="q-num-badge">${globalQ}</span>
        <div>
          <div class="writing-word">${wq.word}</div>
          <div class="writing-hint">${wq.hint}</div>
        </div>
      </div>
      <textarea class="writing-textarea" id="writing_${i}"
        placeholder="${wq.prompt}"
        oninput="saveWriting(${i}, this.value)"></textarea>
      <div><span class="teacher-badge">✏️ 老師批改</span></div>
    `;
    container.appendChild(wCard);
    globalQ++;
  });
}

function escapeStr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// =====================================================================
// INTERACTION
// =====================================================================
function selectAnswer(key, value, partIdx, qIdx) {
  if (submitted) return;

  userAnswers[key] = value;

  // Update button states
  const optsWrap = document.getElementById(`opts_${key}`);
  optsWrap.querySelectorAll('.opt-btn').forEach(btn => {
    if (btn.dataset.value === value) {
      btn.classList.add('selected');
    } else {
      btn.classList.remove('selected');
    }
  });

  updateProgress();
}

function saveWriting(idx, val) {
  writingAnswers[idx] = val;
}

function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  const pct = Math.round((answered / TOTAL_MCQ) * 100);
  document.getElementById('progress-text').textContent = `${answered} / ${TOTAL_MCQ} 已作答`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;

  document.getElementById('submit-btn').disabled = (answered < TOTAL_MCQ);
}

// =====================================================================
// SUBMIT
// =====================================================================
function submitExam() {
  if (submitted) return;
  submitted = true;

  // Calculate scores
  let partScores = {};
  let totalAutoScore = 0;

  PARTS.forEach((part, partIdx) => {
    let earned = 0;
    part.questions.forEach((q, qIdx) => {
      const key = buildQuestionKey(partIdx, qIdx);
      if (userAnswers[key] === q.answer) {
        earned += part.points;
      }
    });
    partScores[part.id] = earned;
    totalAutoScore += earned;
  });

  const displayScore = totalAutoScore; // out of 94

  // Show result screen
  document.getElementById('exam-wrap').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('submit-area').style.display = 'none';

  document.getElementById('score-display').textContent = displayScore;

  // Stars
  let stars, msg, sub;
  if (displayScore >= 85) {
    stars = '⭐⭐⭐';
    msg = '太厲害了！Daisy 超棒！';
    sub = '你已經掌握了所有的詞彙！繼續加油！';
  } else if (displayScore >= 65) {
    stars = '⭐⭐';
    msg = '很好！繼續努力！';
    sub = '大部分都答對了，再複習一下錯誤的單字吧！';
  } else if (displayScore >= 45) {
    stars = '⭐';
    msg = '不錯喔！再加油！';
    sub = '還有一些單字需要練習，不要放棄！';
  } else {
    stars = '💪';
    msg = '繼續努力，你可以的！';
    sub = '多複習一下單字，下次一定會更好！';
  }

  document.getElementById('stars-display').textContent = stars;
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-sub').textContent = sub;

  // Part scores
  ['A','B','C','D','E'].forEach(id => {
    const el = document.getElementById(`pt-${id.toLowerCase()}`);
    if (el) el.textContent = partScores[id] || 0;
  });
}

// =====================================================================
// REVIEW
// =====================================================================
function showReview() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('exam-wrap').style.display = 'block';
  document.getElementById('submit-area').style.display = 'none';

  // Scroll to top
  window.scrollTo(0, 0);

  PARTS.forEach((part, partIdx) => {
    part.questions.forEach((q, qIdx) => {
      const key = buildQuestionKey(partIdx, qIdx);
      const chosen = userAnswers[key];
      const correct = q.answer;
      const optsWrap = document.getElementById(`opts_${key}`);

      optsWrap.querySelectorAll('.opt-btn').forEach(btn => {
        btn.classList.remove('selected');
        const val = btn.dataset.value;
        if (val === correct && val === chosen) {
          btn.classList.add('correct');
        } else if (val === correct && val !== chosen) {
          btn.classList.add('show-correct');
        } else if (val === chosen && val !== correct) {
          btn.classList.add('wrong');
        }
      });

      // Feedback
      const fbEl = document.getElementById(`feedback_${key}`);
      fbEl.style.display = 'block';
      if (chosen === correct) {
        fbEl.innerHTML = `<span class="feedback-tag correct-tag">✓ 答對了！</span>`;
      } else {
        fbEl.innerHTML = `<span class="feedback-tag wrong-tag">✗ 正確答案是：${correct}</span>`;
      }
    });
  });

  // Scroll back to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// =====================================================================
// RESET
// =====================================================================
function resetExam() {
  userAnswers = {};
  writingAnswers = {};
  submitted = false;

  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('exam-wrap').style.display = 'block';
  document.getElementById('submit-area').style.display = 'block';
  document.getElementById('submit-btn').disabled = true;

  renderExam();
  updateProgress();
  window.scrollTo(0, 0);
}

// =====================================================================
// INIT
// =====================================================================
renderExam();
updateProgress();

// Pre-fill date
const today = new Date();
document.getElementById('student-date').value =
  today.getFullYear() + '-' +
  String(today.getMonth()+1).padStart(2,'0') + '-' +
  String(today.getDate()).padStart(2,'0');
</script>
</body>
</html>
