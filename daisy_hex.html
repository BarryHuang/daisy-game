<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>圍貓貓 - Trap the Cat</title>
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Bubblegum Sans', 'Nunito', cursive;
      /* Beautiful ocean background */
      background: linear-gradient(135deg, #2ae0ff 0%, #0072ff 100%);
      touch-action: none;
    }
    
    .clouds {
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image: 
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 15%),
        radial-gradient(circle at 85% 70%, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 20%),
        radial-gradient(circle at 50% 90%, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 10%);
    }

    .game-container {
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      width: 100%; height: 100%; position: relative; z-index: 1;
    }

    /* Top HUD */
    .hud {
      display: flex; justify-content: space-between; align-items: center;
      width: 90%; max-width: 500px; padding: 10px 24px;
      background: rgba(255,255,255,0.9); border-radius: 999px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2), inset 0 -3px 0 rgba(0,0,0,0.05);
      margin-top: max(15px, env(safe-area-inset-top));
      border: 4px solid #fff; z-index: 10;
    }
    .hud-title {
      font-size: 2rem; color: #ff528a;
      text-shadow: 0 2px 4px rgba(255,82,138,0.3);
      letter-spacing: 1px;
    }
    .hud-keys {
      font-size: 1.5rem; color: #f57c00;
      background: #fff3e0; padding: 6px 18px; border-radius: 20px;
      border: 2px solid #ffb74d; font-weight: 800;
    }

    /* Main Area */
    .main-area {
      display: flex; align-items: center; justify-content: center;
      flex: 1; width: 100%; position: relative;
    }
    @media (orientation: portrait) {
      .main-area { flex-direction: column; }
    }

    .canvas-wrapper {
      flex: 1; display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%; min-height: 0; min-width: 0;
    }

    canvas {
      display: block;
      filter: drop-shadow(0px 15px 30px rgba(0,40,80,0.5));
    }

    /* Back Button */
    .back-btn {
      position: absolute; top: max(15px, env(safe-area-inset-top)); left: 15px;
      background: #fff; border: none; border-radius: 50%;
      width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; cursor: pointer; z-index: 50; text-decoration: none; color: #ff528a;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: transform 0.1s;
    }
    .back-btn:active { transform: scale(0.9); }

    /* Stone Sidebar */
    .stone-panel {
      background: rgba(255,255,255,0.85); backdrop-filter: blur(5px);
      border: 4px solid #ce93d8; border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 10;
      margin: 15px;
      flex-shrink: 0;
    }
    @media (orientation: landscape) {
      .stone-panel { flex-direction: column; padding: 15px 12px; }
      .sidebar-text { margin-top: 10px; margin-left: 0; text-align: center; }
    }
    @media (orientation: portrait) {
      .stone-panel { flex-direction: row; padding: 10px 20px; }
      .sidebar-text { margin-top: 0; margin-left: 15px; text-align: left; }
    }

    .stone-source {
      width: 68px; height: 68px;
      background: #a1887f; border-radius: 18px;
      border: 4px solid #5d4037;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem; cursor: grab;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,0.2), 0 6px 0 rgba(0,0,0,0.3);
      user-select: none; touch-action: none;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .stone-source:active { cursor: grabbing; animation: none; transform: scale(0.95); }
    .sidebar-text {
      font-size: 1.1rem; color: #6a1b9a; font-weight: 800;
      line-height: 1.2; white-space: nowrap;
    }

    #ghost-stone {
      position: fixed; width: 72px; height: 72px;
      background: #a1887f; border-radius: 18px; border: 4px solid #5d4037;
      display: flex; align-items: center; justify-content: center; font-size: 3rem;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      pointer-events: none; display: none; z-index: 1000;
      opacity: 0.9; transform: translate(-50%, -50%) scale(1.1);
    }

    /* Modals */
    .modal {
      position: fixed; inset: 0; background: rgba(0,30,60,0.8); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal.active { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: white; padding: 40px 30px; border-radius: 35px;
      text-align: center; max-width: 90%; width: 340px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 5px solid #fff;
    }
    .modal.active .modal-content { transform: scale(1); }
    .modal-title { font-size: 2.6rem; margin-bottom: 12px; color: #ff6b9e; text-shadow: 0 2px 0 #ffb6c1; }
    .modal-msg { font-size: 1.2rem; color: #666; margin-bottom: 25px; line-height: 1.5; font-family: 'Nunito', sans-serif; font-weight: bold; }
    .btn {
      padding: 16px 0; border: none; border-radius: 25px;
      background: linear-gradient(135deg, #ab47bc, #7b1fa2);
      color: white; font-size: 1.4rem; font-family: inherit; font-weight: bold;
      cursor: pointer; box-shadow: 0 6px 0 #4a148c; transition: transform 0.1s, box-shadow 0.1s;
      width: 100%;
    }
    .btn:active { transform: translateY(6px); box-shadow: 0 0 0 #4a148c; }
  </style>
</head>
<body>

  <div class="clouds"></div>
  <a href="daisy_hamster.html" class="back-btn">⬅</a>

  <div class="game-container">
    <div class="hud">
      <div class="hud-title">🐾 圍貓貓</div>
      <div class="hud-keys">🔑 <span id="keysCount">0</span>/3</div>
    </div>

    <div class="main-area">
      <div class="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
      </div>
      
      <div class="stone-panel">
        <div class="stone-source" id="stoneSource">🪨</div>
        <div class="sidebar-text">拖曳或<br>點擊格子</div>
      </div>
    </div>
  </div>

  <div id="ghost-stone">🪨</div>

  <div class="modal" id="modalWin">
    <div class="modal-content">
      <div style="font-size:5rem; margin-top:-20px;">🎉</div>
      <div class="modal-title">太棒了！</div>
      <div class="modal-msg">你成功困住了貓咪！<br>獲得了一把過關鑰匙🔑</div>
      <button class="btn" onclick="nextLevel()">下一關</button>
    </div>
  </div>

  <div class="modal" id="modalLose">
    <div class="modal-content">
      <div style="font-size:5rem; margin-top:-20px;">💨</div>
      <div class="modal-title">哎呀！</div>
      <div class="modal-msg">貓咪溜走了！<br>不要灰心，再試一次吧！</div>
      <button class="btn" onclick="initGame()" style="background: linear-gradient(135deg, #ff9800, #e65100); box-shadow: 0 6px 0 #bf360c;">重新挑戰</button>
    </div>
  </div>

<script>
// --- Hex Grid Math ---
const hexDirections = [
  {q: 1, r: 0}, {q: 1, r: -1}, {q: 0, r: -1},
  {q: -1, r: 0}, {q: -1, r: 1}, {q: 0, r: 1}
];

function hexAdd(a, b) { return {q: a.q + b.q, r: a.r + b.r}; }
function hexDistance(a, b) {
  return (Math.abs(a.q - b.q) + Math.abs(a.r - b.r) + Math.abs(a.q + a.r - b.q - b.r)) / 2;
}

const RADIUS = 5; 
function isOutOfBounds(hex) { return hexDistance({q:0, r:0}, hex) > RADIUS; }
function isEdge(hex) { return hexDistance({q:0, r:0}, hex) === RADIUS; }

function hexToPixel(hex, size) {
  const x = size * Math.sqrt(3) * (hex.q + hex.r/2);
  const y = size * 3/2 * hex.r;
  return {x, y};
}

function pixelToHex(p, size) {
  const q = (Math.sqrt(3)/3 * p.x - 1/3 * p.y) / size;
  const r = (2/3 * p.y) / size;
  return hexRound({q, r});
}

function hexRound(h) {
  let q = Math.round(h.q); let r = Math.round(h.r); let s = Math.round(-h.q - h.r);
  const qDiff = Math.abs(q - h.q); const rDiff = Math.abs(r - h.r); const sDiff = Math.abs(s - (-h.q - h.r));
  if (qDiff > rDiff && qDiff > sDiff) q = -r - s;
  else if (rDiff > sDiff) r = -q - s;
  return {q, r};
}

// --- Game State ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let hexSize = 30; 
let offsetX = 0, offsetY = 0;

let catPos = {q: 0, r: 0};
let blocks = new Map(); // Store block type: "q,r" -> 'crystal' or 'stone'
let gameState = 'playing'; 
let keys = 0;
let animFrame = 0;

// --- Init & Resize ---
function resize() {
  const wrapper = document.querySelector('.canvas-wrapper');
  if (!wrapper) return;
  const cw = wrapper.clientWidth;
  const ch = wrapper.clientHeight;
  
  const gridW = Math.sqrt(3) * (2*RADIUS + 1);
  const gridH = (3*RADIUS + 2);
  
  hexSize = Math.min(cw / gridW, ch / gridH) * 0.95;
  
  canvas.width = hexSize * gridW * 1.05;
  canvas.height = hexSize * gridH * 1.05;
  
  offsetX = canvas.width / 2;
  offsetY = canvas.height / 2;
}
window.addEventListener('resize', resize);

function initGame() {
  gameState = 'playing';
  catPos = {q: 0, r: 0};
  blocks.clear();
  animFrame = 0;
  
  // 8 to 13 blocks initially
  const numInitialBlocks = 8 + Math.floor(Math.random() * 6);
  let placed = 0;
  while(placed < numInitialBlocks) {
    const q = -RADIUS + Math.floor(Math.random() * (2*RADIUS + 1));
    const r = -RADIUS + Math.floor(Math.random() * (2*RADIUS + 1));
    const hex = {q, r};
    // Don't block center (cat) and its immediate neighbors to ensure fair start
    if (!isOutOfBounds(hex) && hexDistance(hex, {q:0, r:0}) > 1) { 
      const key = `${q},${r}`;
      if (!blocks.has(key)) {
        // 30% chance for a crystal, 70% for stone monument
        const type = Math.random() < 0.3 ? 'crystal' : 'stone';
        blocks.set(key, type);
        placed++;
      }
    }
  }
  
  document.getElementById('modalWin').classList.remove('active');
  document.getElementById('modalLose').classList.remove('active');
  resize();
}

function nextLevel() {
  keys++;
  document.getElementById('keysCount').textContent = keys;
  if(keys >= 3) {
    alert("恭喜！你收集滿3把鑰匙了！太厲害啦！");
    keys = 0;
    document.getElementById('keysCount').textContent = keys;
  }
  initGame();
}

// --- AI: BFS ---
function getNeighbors(hex) {
  return hexDirections.map(d => hexAdd(hex, d))
    .filter(n => !isOutOfBounds(n) && !blocks.has(`${n.q},${n.r}`));
}

function getEscapePath(start) {
  const queue = [start];
  const cameFrom = new Map();
  cameFrom.set(`${start.q},${start.r}`, null);
  
  let escapeHex = null;
  while (queue.length > 0) {
    const current = queue.shift();
    if (isEdge(current)) {
      escapeHex = current; break;
    }
    for (const next of getNeighbors(current)) {
      const key = `${next.q},${next.r}`;
      if (!cameFrom.has(key)) {
        queue.push(next);
        cameFrom.set(key, current);
      }
    }
  }
  if (!escapeHex) return null; 
  
  let current = escapeHex;
  const path = [];
  while (current) {
    path.push(current);
    const parent = cameFrom.get(`${current.q},${current.r}`);
    if (!parent || (parent.q === start.q && parent.r === start.r)) break;
    current = parent;
  }
  return path.reverse(); 
}

function moveCat() {
  const path = getEscapePath(catPos);
  if (path && path.length > 0) {
    catPos = path[0];
  } else {
    const neighbors = getNeighbors(catPos);
    if (neighbors.length > 0) catPos = neighbors[Math.floor(Math.random() * neighbors.length)];
  }
  checkGameState();
}

function checkGameState() {
  if (isEdge(catPos)) {
    gameState = 'lose';
    setTimeout(() => document.getElementById('modalLose').classList.add('active'), 600);
  } else if (!getEscapePath(catPos) && getNeighbors(catPos).length === 0) {
    gameState = 'win';
    setTimeout(() => document.getElementById('modalWin').classList.add('active'), 1200);
  }

}

// --- Interaction ---
function handleHexInteraction(p) {
  if (gameState !== 'playing') return;
  const hex = pixelToHex({x: p.x - offsetX, y: p.y - offsetY}, hexSize);
  if (isOutOfBounds(hex)) return;
  if (hex.q === catPos.q && hex.r === catPos.r) return; 
  
  const key = `${hex.q},${hex.r}`;
  if (!blocks.has(key)) {
    blocks.set(key, 'stone');

    setTimeout(moveCat, 250); 
  }
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  handleHexInteraction({x: e.clientX - rect.left, y: e.clientY - rect.top});
});

// Drag & Drop
const source = document.getElementById('stoneSource');
const ghost = document.getElementById('ghost-stone');
let isDragging = false;

function onDragStart(e) {
  if(gameState !== 'playing') return;
  isDragging = true;
  ghost.style.display = 'flex';
  updateGhostPos(e);
}
function onDragMove(e) {
  if (!isDragging) return;
  updateGhostPos(e);
}
function onDragEnd(e) {
  if (!isDragging) return;
  isDragging = false;
  ghost.style.display = 'none';
  
  const rect = canvas.getBoundingClientRect();
  const clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
  const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
  
  if (clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom) {
    handleHexInteraction({x: clientX - rect.left, y: clientY - rect.top});
  }
}

function updateGhostPos(e) {
  const clientX = e.clientX || (e.touches && e.touches[0].clientX);
  const clientY = e.clientY || (e.touches && e.touches[0].clientY);
  ghost.style.left = clientX + 'px';
  ghost.style.top = clientY + 'px';
}

source.addEventListener('mousedown', onDragStart);
document.addEventListener('mousemove', onDragMove);
document.addEventListener('mouseup', onDragEnd);
source.addEventListener('touchstart', onDragStart, {passive: false});
document.addEventListener('touchmove', onDragMove, {passive: false});
document.addEventListener('touchend', onDragEnd);

// --- Drawing Loop ---
function drawHex(ctx, x, y, size, fillStyle, strokeStyle, bottomStyle) {
  // Draw bottom 3D shadow
  if (bottomStyle) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = Math.PI / 3 * i - Math.PI / 6;
      const px = x + size * Math.cos(angle);
      const py = y + size * Math.sin(angle) + (size * 0.2); // Offset downwards
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = bottomStyle; ctx.fill();
  }

  // Draw main top face
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 3 * i - Math.PI / 6;
    const px = x + size * Math.cos(angle);
    const py = y + size * Math.sin(angle);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  if (fillStyle) { ctx.fillStyle = fillStyle; ctx.fill(); }
  if (strokeStyle) { ctx.strokeStyle = strokeStyle; ctx.lineWidth = 3; ctx.stroke(); }
}

function render() {
  animFrame++;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw Grid
  for (let q = -RADIUS; q <= RADIUS; q++) {
    for (let r = -RADIUS; r <= RADIUS; r++) {
      const hex = {q, r};
      if (!isOutOfBounds(hex)) {
        const p = hexToPixel(hex, hexSize);
        const px = p.x + offsetX;
        const py = p.y + offsetY;
        
        let fill = '#ffe0b2'; // Warm sand color
        let stroke = '#ffb74d';
        let bottom = '#e65100'; // Darker shadow
        
        if (gameState === 'win') {
          fill = '#e8f5e9'; stroke = '#81c784'; bottom = '#2e7d32'; // Green success
        }

        drawHex(ctx, px, py, hexSize * 0.92, fill, stroke, bottom);
        
        // Draw Blocks
        const blockType = blocks.get(`${q},${r}`);
        if (blockType) {
          ctx.font = `${hexSize*1.3}px sans-serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          
          if (blockType === 'crystal') {
            // Glowing blue crystal
            ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 15;
            ctx.fillText('💎', px, py - hexSize*0.1);
            ctx.shadowBlur = 0;
          } else {
            // Stone monument
            ctx.fillStyle = '#8d6e63';
            ctx.beginPath();
            ctx.arc(px, py + hexSize*0.1, hexSize*0.65, Math.PI, 0);
            ctx.rect(px - hexSize*0.65, py + hexSize*0.1, hexSize*1.3, hexSize*0.35);
            ctx.fill();
            
            ctx.fillStyle = '#4dd0e1'; // Blue paw
            ctx.font = `${hexSize*0.65}px sans-serif`;
            ctx.fillText('🐾', px, py + hexSize*0.05);
          }
        }
      }
    }
  }
  
  // Draw Cat
  const p = hexToPixel(catPos, hexSize);
  const catX = p.x + offsetX;
  // Make the cat bounce slightly
  const bounce = Math.sin(animFrame * 0.1) * (hexSize * 0.08);
  const catY = p.y + offsetY - hexSize*0.2 + bounce;
  
  ctx.font = `${hexSize*1.6}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(p.x + offsetX, p.y + offsetY + hexSize*0.2, hexSize*0.5, hexSize*0.2, 0, 0, Math.PI*2); ctx.fill();
  
  let catEmoji = gameState === 'lose' ? '😿' : (gameState === 'win' ? '😻' : '🦊');
  if(gameState === 'win') {
    ctx.shadowColor = '#ffeb3b'; ctx.shadowBlur = 30;
  }
  ctx.fillText(catEmoji, catX, catY);
  ctx.shadowBlur = 0;

  // Win Ring Animation
  if (gameState === 'win') {
    const ringRadius = hexSize * 0.5 + (animFrame % 60) * 8;
    ctx.beginPath();
    ctx.arc(catX, catY, ringRadius, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255, 235, 59, ${1 - (animFrame % 60)/60})`;
    ctx.lineWidth = 15;
    ctx.stroke();
  }

  requestAnimationFrame(render);
}

// Start
initGame();
render();

</script>
</body>
</html>
