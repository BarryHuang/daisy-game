<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'Arial', sans-serif;

    color: #222;

    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 14px 20px;

    color: #7c4dff;
    font-weight: bold;

  /* ── Exam wrapper ── */

    border-radius: 16px;

  }
  .header-card .subtitle {

    color: #666;
    margin-bottom: 14px;
  }
  .info-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .info-field {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
  }
  .info-field label { font-weight: bold; color: #7c4dff; white-space: nowrap; }
  .info-field input {
    border: none;
    border-bottom: 2px solid #ce93d8;
    outline: none;
    font-size: 14px;
    padding: 2px 4px;
    width: 120px;
    color: #222;
    background: transparent;
  }

  /* ── Progress bar ── */
  .progress-wrap { margin-top: 4px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
  }
  .progress-bar-bg {
    height: 10px;
    background: #ede7ff;
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #7c4dff, #b388ff);
    border-radius: 10px;
    transition: width 0.3s ease;
    width: 0%;

  .q-sub {
    font-size: 13px;

    display: flex;
    flex-direction: column;
    gap: 10px;

  .opt-btn {
    width: 100%;
    min-height: 54px;
    padding: 12px 18px;
    border: 2px solid #b0bec5;
    border-radius: 28px;
    background: #fafafa;
    font-size: 16px;
    color: #333;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s ease;
    -webkit-appearance: none;
    line-height: 1.4;
    display: flex;
    align-items: center;
    gap: 10px;
    touch-action: manipulation;

  .opt-btn:active { transform: scale(0.98); }
  .opt-btn.selected {
    background: #7c4dff;
    border-color: #7c4dff;
    color: white;
    font-weight: bold;

<script>
// =====================================================================
// SPEECH
// =====================================================================
// Cache API results so repeated taps don't re-fetch
const _audioCache = {};
let _currentAudio = null;

async function speakWord(word) {
  // Stop anything already playing
  if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();

  // Cached hit (false = no audio found previously → go straight to fallback)
  if (_audioCache[word] === false) { _speakFallback(word); return; }
  if (_audioCache[word])           { _playUrl(_audioCache[word], word); return; }

  // Fetch from Free Dictionary API (real human recording, American English)
  try {
    const res = await fetch(
      'https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word),
      { signal: AbortSignal.timeout(4000) }
    );
    if (!res.ok) throw new Error('not found');
    const data = await res.json();

    let url = '';
    for (const entry of data) {
      for (const p of (entry.phonetics || [])) {
        if (p.audio) { url = p.audio; break; }
      }
      if (url) break;
    }

    if (url) {
      if (url.startsWith('//')) url = 'https:' + url;
      _audioCache[word] = url;
      _playUrl(url, word);
    } else {
      _audioCache[word] = false;
      _speakFallback(word);
    }
  } catch (_) {
    _audioCache[word] = false;
    _speakFallback(word);
  }
}

function _playUrl(url, word) {
  const a = new Audio(url);
  _currentAudio = a;
  a.play().catch(() => _speakFallback(word));
}

function _speakFallback(word) {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang  = 'en-US';
  utt.rate  = 0.8;
  utt.pitch = 1;
  window.speechSynthesis.speak(utt);
}

      { text: 'spider', sub: 'How do you divide this word?', options: ['spi/der', 'sp/ider', 'spid/er'], answer: 'spi/der', speak: 'spider' },
      { text: 'begin', sub: 'How do you divide this word?', options: ['beg/in', 'be/gin', 'b/egin'], answer: 'be/gin', speak: 'begin' },

    pointEach: 2,
    maxScore: 8,
    questions: [
      { text: 'Which word has the LONG /oo/ sound like in "moon"?', sub: '(1)', options: ['pool', 'book'], answer: 'pool', speakPair: ['pool', 'book'] },
      { text: 'Which word has the LONG /oo/ sound like in "moon"?', sub: '(2)', options: ['soon', 'wood'], answer: 'soon', speakPair: ['soon', 'wood'] },
      { text: 'Which word has the LONG /oo/ sound like in "moon"?', sub: '(3)', options: ['food', 'look'], answer: 'food', speakPair: ['food', 'look'] },
      { text: 'Which word has the LONG /oo/ sound like in "moon"?', sub: '(4)', options: ['cool', 'foot'], answer: 'cool', speakPair: ['cool', 'foot'] }
    ]
  },
  {
    id: 'I',
    title: 'Plural -es — 選出正確複數',
    instruction: '選出每個單字正確的複數形式。',
    pointEach: 1,
    maxScore: 4,
    questions: [
      { text: 'fox →', options: ['foxes', 'foxs', 'fox'], answer: 'foxes' },
      { text: 'dish →', options: ['dishs', 'dishes', 'dishies'], answer: 'dishes' },

  {

    instruction: '閱讀故事後選出最正確的答案。',
    pointEach: 2,
    maxScore: 10,
    passage: true,
    questions: [
      { text: 'What is Fern?', options: ['a fish', 'a bird', 'a frog'], answer: 'a bird' },
      { text: 'Where does Fern sit?', options: ['on a branch', 'in the pond', 'on her perch'], answer: 'on her perch' },
      { text: 'What makes Fern perk up?', options: ['summer', 'spring', 'winter'], answer: 'spring' },
      { text: 'What does Fern see at the park?', options: ['flowers and trees', 'grass and bugs and twigs', 'fish and frogs'], answer: 'grass and bugs and twigs' },
      { text: 'The word "chirp" has which vowel pattern?', options: ['ir', 'ar', 'oa'], answer: 'ir' }

const TOTAL_MCQ = PARTS.reduce((s, p) => s + p.questions.length, 0); // 51
const POINTS_MAP = {}; // partId -> pointEach
PARTS.forEach(p => POINTS_MAP[p.id] = p.pointEach);

// =====================================================================
// STATE
// =====================================================================
let userAnswers = {}; // key: "partIdx_qIdx", value: chosen string
let submitted = false;

// =====================================================================
// RENDER
// =====================================================================
function buildKey(partIdx, qIdx) {
  return `${partIdx}_${qIdx}`;
}

function escStr(s) {
  return s.replace(/'/g, "\\'").replace(/\\/g, '\\\\');
}

function renderExam() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  let globalQ = 1;

  PARTS.forEach((part, partIdx) => {
    // Section header
    const secEl = document.createElement('div');
    secEl.className = 'section-header';
    secEl.innerHTML = `
      <span class="section-badge">Part ${part.id}</span>
      <span class="section-title">${part.title}</span>
      <span class="section-score">${part.maxScore}分</span>
    `;
    container.appendChild(secEl);

    // Instruction
    const instr = document.createElement('p');
    instr.style.cssText = 'font-size:14px;color:#666;margin-bottom:10px;font-style:italic;padding-left:4px;';
    instr.textContent = part.instruction;
    container.appendChild(instr);

    // Passage (Part J)
    if (part.passage) {
      const passageText = "Fern is a bird. She sits on her perch. She sees the sun start to come up. Fern chirps and twirls! Spring makes her perk up. She flaps her wings and goes far. She goes to the park. She sees grass and dirt. She sees bugs and twigs. Then she feels a thirst. She sips from the pond. Slurp, slurp!";
      const pb = document.createElement('div');
      pb.className = 'passage-box';
      pb.innerHTML = `
        <button class="speak-btn" onclick="speakWord('${passageText.replace(/'/g, "\\'")}')">🔊 朗讀課文</button>
        <h3>Fern the Bird</h3>
        <p>Fern is a bird. She sits on her <strong>perch</strong>. She sees the sun start to come up.
        Fern <strong>chirps</strong> and <strong>twirls</strong>! Spring makes her perk up.
        She flaps her wings and goes far. She goes to the park.
        She sees grass and dirt. She sees bugs and twigs.
        Then she feels a thirst. She sips from the pond. Slurp, slurp!</p>
      `;
      container.appendChild(pb);
    }

    part.questions.forEach((q, qIdx) => {
      const key = buildKey(partIdx, qIdx);
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = `qcard_${key}`;

      const letters = ['A', 'B', 'C'];
      const optsHtml = q.options.map((opt, i) => {
        const escaped = opt.replace(/'/g, '&apos;').replace(/"/g, '&quot;');
        return `
          <button class="opt-btn" id="opt_${key}_${i}"
            onclick="selectAnswer('${key}', this.dataset.value, ${partIdx}, ${qIdx})"
            data-value="${escaped}">
            <span class="opt-letter">${letters[i] || i+1}</span>
            <span>${opt}</span>
          </button>
        `;
      }).join('');

      const subHtml = q.sub ? `<div class="q-sub">${q.sub}</div>` : '';

      // Build speak button(s)
      let speakHtml = '';
      if (q.speak) {
        const safeWord = q.speak.replace(/'/g, "\\'");
        speakHtml = `<button class="speak-btn" onclick="speakWord('${safeWord}')">🔊 聽發音</button>`;
      } else if (q.speakPair) {
        speakHtml = q.speakPair.map((w, i) => {
          const safeW = w.replace(/'/g, "\\'");
          return `<button class="speak-btn" onclick="speakWord('${safeW}')">🔊 選項 ${i + 1}</button>`;
        }).join(' ');
      }

      card.innerHTML = `
        <div class="q-num-row">
          <span class="q-num-badge">${globalQ}</span>
          <div>
            <div class="q-text">${q.text}</div>
            ${subHtml}
          </div>
        </div>
        ${speakHtml ? `<div style="margin-bottom:4px;">${speakHtml}</div>` : ''}
        <div class="options-wrap" id="opts_${key}">${optsHtml}</div>
        <div id="feedback_${key}" style="display:none;"></div>
      `;
      container.appendChild(card);
      globalQ++;
    });
  });
}

// =====================================================================
// INTERACTION
// =====================================================================
function selectAnswer(key, value, partIdx, qIdx) {
  if (submitted) return;
  userAnswers[key] = value;

  const optsWrap = document.getElementById(`opts_${key}`);
  optsWrap.querySelectorAll('.opt-btn').forEach(btn => {
    if (btn.dataset.value === value) {
      btn.classList.add('selected');
    } else {
      btn.classList.remove('selected');
    }
  });

  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  const pct = Math.round((answered / TOTAL_MCQ) * 100);
  document.getElementById('progress-text').textContent = `${answered} / ${TOTAL_MCQ} 已作答`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('submit-btn').disabled = (answered < TOTAL_MCQ);
}

// =====================================================================
// SUBMIT
// =====================================================================
function submitExam() {
  if (submitted) return;
  submitted = true;

  let partScores = {};
  let totalRaw = 0;
  let totalMax = 0;

  PARTS.forEach((part, partIdx) => {
    let earned = 0;
    part.questions.forEach((q, qIdx) => {
      const key = buildKey(partIdx, qIdx);
      if (userAnswers[key] === q.answer) earned += part.pointEach;
    });
    partScores[part.id] = earned;
    totalRaw += earned;
    totalMax += part.maxScore;
  });

  // Scale to 100
  const scaledScore = Math.round((totalRaw / totalMax) * 100);

  // Hide exam, show result
  document.getElementById('exam-wrap').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('submit-area').style.display = 'none';

  document.getElementById('score-display').textContent = scaledScore;

  let stars, msg, sub;
  if (scaledScore >= 90) {
    stars = '⭐⭐⭐';
    msg = '完美！Daisy 是發音高手！';
    sub = '所有發音規則都掌握得很好！';
  } else if (scaledScore >= 70) {
    stars = '⭐⭐';
    msg = '很棒！繼續加油！';
    sub = '大部分的發音規則都答對了，再多練習幾個！';
  } else if (scaledScore >= 50) {
    stars = '⭐';
    msg = '不錯！再努力一點！';
    sub = '繼續練習發音規則，你可以做到的！';
  } else {
    stars = '💪';
    msg = '繼續加油，你可以的！';
    sub = '多複習一下發音規則，下次一定更好！';
  }

  document.getElementById('stars-display').textContent = stars;
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-sub').textContent = sub;

  // Build score table
  const hdr = document.getElementById('score-table-header');
  const earnedRow = document.getElementById('score-table-earned');
  const maxRow = document.getElementById('score-table-max');

  hdr.innerHTML = '<th>Part</th>' + PARTS.map(p => `<th>${p.id}</th>`).join('');
  earnedRow.innerHTML = '<td>得分</td>' + PARTS.map(p => `<td>${partScores[p.id]}</td>`).join('');
  maxRow.innerHTML = '<td>滿分</td>' + PARTS.map(p => `<td>${p.maxScore}</td>`).join('');
}

// =====================================================================
// REVIEW
// =====================================================================
function showReview() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('exam-wrap').style.display = 'block';
  document.getElementById('submit-area').style.display = 'none';
  window.scrollTo(0, 0);

  PARTS.forEach((part, partIdx) => {
    part.questions.forEach((q, qIdx) => {
      const key = buildKey(partIdx, qIdx);
      const chosen = userAnswers[key];
      const correct = q.answer;
      const optsWrap = document.getElementById(`opts_${key}`);

      optsWrap.querySelectorAll('.opt-btn').forEach(btn => {
        btn.classList.remove('selected');
        const val = btn.dataset.value;
        if (val === correct && val === chosen) {
          btn.classList.add('correct');
        } else if (val === correct && val !== chosen) {
          btn.classList.add('show-correct');
        } else if (val === chosen && val !== correct) {
          btn.classList.add('wrong');
        }
      });

      const fbEl = document.getElementById(`feedback_${key}`);
      fbEl.style.display = 'block';
      if (chosen === correct) {
        fbEl.innerHTML = `<span class="feedback-tag correct-tag">✓ 答對了！${q.word ? ' → ' + q.word : ''}</span>`;
      } else {
        fbEl.innerHTML = `<span class="feedback-tag wrong-tag">✗ 正確答案是：${correct}${q.word ? ' → ' + q.word : ''}</span>`;
      }
    });
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// =====================================================================
// RESET
// =====================================================================
function resetExam() {
  userAnswers = {};
  submitted = false;

  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('exam-wrap').style.display = 'block';
  document.getElementById('submit-area').style.display = 'block';
  document.getElementById('submit-btn').disabled = true;

  renderExam();
  updateProgress();
  window.scrollTo(0, 0);
}

// =====================================================================
// INIT
// =====================================================================
renderExam();
updateProgress();

const today = new Date();
document.getElementById('student-date').value =
  today.getFullYear() + '-' +
  String(today.getMonth()+1).padStart(2,'0') + '-' +
  String(today.getDate()).padStart(2,'0');
</script>
